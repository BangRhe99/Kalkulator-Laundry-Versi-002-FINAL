<!--
===============================================================================
FILE: Script_Fitur_Dashboard_Kartu.html
PROJECT: Kalkulator Laundry Versi 002
ISI: Render 6 kartu ringkasan dashboard (Profil Outlet, Master Biaya, HPP,
     Harga Layanan, Fixed Cost, BEP + Potensi Omset) & modal "Atur %" mix BEP.

FUNGSI:
Tiap kartu ringkasan dashboard (kartu HP di #screenMenu MAUPUN panel
"Ringkasan Eksekutif" desktop, lihat targetId opsional di beberapa fungsi
di sini) dirender oleh SATU fungsi renderDashboard*Card di file ini, dipanggil
dari renderDashboardFullSummary_ (Script_Fitur_Dashboard.html) dengan data
dari SATU roundtrip getDashboardFullSummary(). Kalau mau ubah tampilan/isi
salah satu dari 6 kartu itu, cari fungsinya di sini.

DIPECAH dari Script_Fitur_Dashboard.html (2026-07-12) supaya file itu tidak
terus membengkak - lihat riwayat pemecahan lengkap di Index.html & panduan
pemecahan file besar di KONTEKS_PROYEK.md. Fungsi & var di file ini TIDAK
berubah sama sekali saat dipindah, murni potong-tempel.

PENTING -- catat sebelum edit:
Semua file Script_*.html berbagi SATU scope global yang sama (Apps Script
include() cuma menggabungkan teks mentah jadi satu <script> demi <script>
di halaman yang sama -- bukan module system). Karena itu file ini SENGAJA
TIDAK dibungkus (function(){...})() -- kalau kamu bungkus lagi, fungsi di
file ini jadi tidak kelihatan dari file lain dan app akan rusak.
Urutan include TIDAK masalah untuk deklarasi function/var (hoisting),
TAPI Script_Boot_Main.html WAJIB tetap paling terakhir karena dia yang
menjalankan bootApp().

DAFTAR ISI (cari nama fungsi ini kalau butuh mengubah/memahami):
  - renderDashboardCabangCard + buildProfilOutletCardHtml_
      -> kartu "Profil Outlet" (dipakai bareng layar Profil Outlet desktop,
         lihat Script_Fitur_Cabang.html).
  - renderDashboardMasterBiayaCard
      -> kartu "Master Biaya" (ringkasan 6 komponen biaya + progress bar).
  - renderDashboardHPPCard
      -> kartu "Struktur Biaya HPP" (mini card per layanan, expand/collapse).
  - hlMarginTier_, hlUnitLabel_, renderDashboardHargaLayananCard
      -> kartu "Harga Layanan" (status margin, detail perhitungan per Load/Kg).
  - renderDashboardFixedCostCard
      -> kartu "Biaya Tetap Outlet".
  - renderDashboardBEPCard, renderDashboardPotensiOmsetCard
      -> kartu "BEP" & "Potensi Omset" (termasuk grafik SVG buildBepChartSvg,
         fungsinya ada di Script_Shared_Util.html).
  - bepMixCurrentServices, openBepMix/closeBepMix/renderBepMixList_/
    updateBepMixTotal/saveBepMix
      -> modal "Atur %" kontribusi layanan (dipakai bareng BEP & Potensi
         Omset, disimpan lewat saveBepServiceMix di Modul_Dashboard.gs).

DIPAKAI OLEH FILE LAIN:
  - Script_Fitur_Dashboard.html : renderDashboardFullSummary_ memanggil
    SEMUA fungsi renderDashboard*Card di file ini setiap kali data baru
    datang dari getDashboardFullSummary().
  - dashboardSelectedOutletId & getStoredOutletId_ yang dipakai openBepMix/
    saveBepMix di file ini DIDEKLARASIKAN di
    Script_Fitur_Dashboard_OutletPicker.html - aman krn satu scope global
    yang sama, TIDAK perlu include khusus.
===============================================================================
-->
<script>
"use strict";
  var bepMixCurrentServices = [];

  function renderDashboardCabangCard(res) {
        if (!res || !res.ok) {
          setDashboardCardError("dashboardCabangSummary", res && res.error ? res.error : "Data cabang belum bisa dibaca.");
          return;
        }

        var data = res.data || {};
        var rows = Array.isArray(data.rows) ? data.rows : [];

        if (!rows.length) {
          setDashboardCardHtml("dashboardCabangSummary", '<div class="dashboard-empty">Belum ada outlet. Mulai dari Profil Outlet.</div>');
          return;
        }

        var html = rows.slice(0, 1).map(buildProfilOutletCardHtml_).join('');
        setDashboardCardHtml("dashboardCabangSummary", html);
  }

  /**
   * buildProfilOutletCardHtml_: pembangun markup ".profil-outlet-card" (kartu
   * premium: kategori + jam, KPI cuci/kering/setrika, blok mesin). Dipakai
   * bareng oleh kartu Profil Outlet di Dashboard (renderDashboardCabangCard)
   * DAN layar Profil Outlet desktop (renderProfilOutletDesktop_ di
   * Script_Fitur_Cabang.html) supaya tampilannya identik & satu sumber.
   * Argumen "row" = hasil map ke bentuk ringkasan (mapCabangRowToProfilSummary_,
   * fungsinya ada di Script_Fitur_Dashboard.html).
   */
  function buildProfilOutletCardHtml_(row) {
          var jamBuka = row.jamBukaMenit != null ? row.jamBukaMenit : 0;
          var jamTutup = row.jamTutupMenit != null ? row.jamTutupMenit : 0;
          var totalMenit = jamTutup > jamBuka ? jamTutup - jamBuka : (jamTutup + 1440 - jamBuka);
          var jamOps = Math.floor(totalMenit / 60);
          var jamBukaH = Math.floor(jamBuka/60); var jamBukaM = jamBuka%60;
          var jamTutupH = Math.floor(jamTutup/60); var jamTutupM = jamTutup%60;
          var jamBukaStr = (jamBukaH < 10 ? '0' : '') + jamBukaH + '.' + (jamBukaM < 10 ? '0' : '') + jamBukaM;
          var jamTutupStr = (jamTutupH < 10 ? '0' : '') + jamTutupH + '.' + (jamTutupM < 10 ? '0' : '') + jamTutupM;
          var kategoriLabel = row.kategoriLayanan === 'self_service' ? 'Self Service' : (row.kategoriLayanan === 'jasa_setrika' ? 'Jasa Setrika' : (row.kategoriLayanan === 'drop_off' ? 'Drop Off' : (row.kategoriLayanan === 'hybrid' ? 'Hybrid' : (row.kategoriLayanan || '-'))));
          var isSetrikaOnlyKategori = row.kategoriLayanan === 'jasa_setrika';
          var isKiloanKategori = row.kategoriLayanan === 'drop_off' || row.kategoriLayanan === 'hybrid';
          var hasSetrika = (isKiloanKategori || isSetrikaOnlyKategori) && Number(row.totalUnitSetrika || 0) > 0;
          var jenisSetrikaLabel = row.jenisSetrika === 'listrik' ? 'Setrika Listrik' : (row.jenisSetrika === 'uap' ? 'Setrika Uap' : 'Belum dipilih');

          var setrikaKpiItemHtml =
                '<div class="profil-kpi-item setrika">' +
                  '<span class="profil-kpi-label">Kap. Setrika</span>' +
                  '<div class="profil-kpi-value-row">' +
                    '<span class="profil-kpi-value">' + escapeHtml(formatNum(row.kgSetrikaPerBulan || 0)) + '</span>' +
                    '<span class="profil-kpi-unit">kg/bln</span>' +
                  '</div>' +
                  '<div class="profil-kpi-okupansi">Okupansi ' + escapeHtml(String(row.okupansiSetrika || 0)) + '%</div>' +
                '</div>';
          var setrikaKpiHtml = !hasSetrika ? '' : ('<div class="profil-kpi-divider"></div>' + setrikaKpiItemHtml);

          var setrikaMesinItemHtml =
                '<div class="profil-mesin-item volt">' +
                  '<span class="profil-mesin-count">' + escapeHtml(String(row.totalUnitSetrika || 0)) + '</span>' +
                  '<span class="profil-mesin-type">setrika</span>' +
                  '<span class="profil-mesin-kategori">' + escapeHtml(jenisSetrikaLabel) + '</span>' +
                  (row.kapasitasSetrikaKgPerJam > 0 ? '<span class="profil-mesin-durasi">' + formatNum(row.kapasitasSetrikaKgPerJam) + ' kg/jam</span>' : '') +
                '</div>';
          var setrikaMesinHtml = !hasSetrika ? '' : setrikaMesinItemHtml;

          var setrikaFlatRowHtml =
                '<div class="profil-outlet-kpi kpi-3col">' +
                  '<div class="profil-kpi-item setrika">' +
                    '<span class="profil-kpi-label">Unit Setrika</span>' +
                    '<div class="profil-kpi-value-row">' +
                      '<span class="profil-kpi-value">' + escapeHtml(String(row.totalUnitSetrika || 0)) + '</span>' +
                      '<span class="profil-kpi-unit">unit</span>' +
                    '</div>' +
                    '<div class="profil-kpi-okupansi">' + escapeHtml(jenisSetrikaLabel) + '</div>' +
                  '</div>' +
                  '<div class="profil-kpi-divider"></div>' +
                  '<div class="profil-kpi-item setrika">' +
                    '<span class="profil-kpi-label">Kapasitas</span>' +
                    '<div class="profil-kpi-value-row">' +
                      '<span class="profil-kpi-value">' + escapeHtml(formatNum(row.kapasitasSetrikaKgPerJam || 0)) + '</span>' +
                      '<span class="profil-kpi-unit">kg/jam</span>' +
                    '</div>' +
                  '</div>' +
                  '<div class="profil-kpi-divider"></div>' +
                  '<div class="profil-kpi-item setrika">' +
                    '<span class="profil-kpi-label">Okupansi</span>' +
                    '<div class="profil-kpi-value-row">' +
                      '<span class="profil-kpi-value">' + escapeHtml(String(row.okupansiSetrika || 0)) + '</span>' +
                      '<span class="profil-kpi-unit">%</span>' +
                    '</div>' +
                  '</div>' +
                '</div>';

          var kpiBlockHtml = isSetrikaOnlyKategori
            ? setrikaFlatRowHtml
            : (
              '<div class="profil-outlet-kpi' + (hasSetrika ? ' kpi-3col' : '') + '">' +
                '<div class="profil-kpi-item cuci">' +
                  '<span class="profil-kpi-label">Kap. Cuci</span>' +
                  '<div class="profil-kpi-value-row">' +
                    '<span class="profil-kpi-value">' + escapeHtml(formatNum(row.loadCuciPerBulan || 0)) + '</span>' +
                    '<span class="profil-kpi-unit">load</span>' +
                  '</div>' +
                  '<div class="profil-kpi-okupansi">Okupansi ' + escapeHtml(String(row.okupansiCuci || 0)) + '%</div>' +
                '</div>' +
                '<div class="profil-kpi-divider"></div>' +
                '<div class="profil-kpi-item kering">' +
                  '<span class="profil-kpi-label">Kap. Kering</span>' +
                  '<div class="profil-kpi-value-row">' +
                    '<span class="profil-kpi-value">' + escapeHtml(formatNum(row.loadKeringPerBulan || 0)) + '</span>' +
                    '<span class="profil-kpi-unit">load</span>' +
                  '</div>' +
                  '<div class="profil-kpi-okupansi">Okupansi ' + escapeHtml(String(row.okupansiKering || 0)) + '%</div>' +
                '</div>' +
                setrikaKpiHtml +
              '</div>'
            );

          var mesinBlockHtml = isSetrikaOnlyKategori
            ? ''
            : (
              '<div class="profil-outlet-mesin">' +
                '<div class="profil-mesin-item sage">' +
                  '<span class="profil-mesin-count">' + escapeHtml(String(row.totalUnitCuci || 0)) + '</span>' +
                  '<span class="profil-mesin-type">washer</span>' +
                  '<span class="profil-mesin-kategori">' + escapeHtml(row.jenisCuci || 'home') + '</span>' +
                  (row.durasiCuci > 0 ? '<span class="profil-mesin-durasi">' + row.durasiCuci + ' menit</span>' : '') +
                '</div>' +
                '<div class="profil-mesin-item brass">' +
                  '<span class="profil-mesin-count">' + escapeHtml(String(row.totalUnitPengering || 0)) + '</span>' +
                  '<span class="profil-mesin-type">dryer</span>' +
                  '<span class="profil-mesin-kategori">' + escapeHtml(row.jenisKering || 'commercial') + '</span>' +
                  (row.durasiKering > 0 ? '<span class="profil-mesin-durasi">' + row.durasiKering + ' menit</span>' : '') +
                '</div>' +
                setrikaMesinHtml +
              '</div>'
            );

          return (
            '<div class="profil-outlet-card">' +
              '<div class="profil-outlet-meta">' +
                '<span class="profil-outlet-kategori">' + escapeHtml(kategoriLabel) + '</span>' +
                '<span class="profil-outlet-jam">' +
                  jamBukaStr + ' – ' + jamTutupStr + ' · ' + jamOps + ' jam' +
                  '<span class="profil-kpi-okupansi profil-outlet-okupansi-info">' +
                    '<button type="button" class="okupansi-info-btn" onclick="toggleOkupansiTooltip(this, event)" aria-label="Apa itu okupansi?">?</button>' +
                    '<div class="okupansi-tooltip">Okupansi adalah perkiraan seberapa sering mesin dipakai. Okupansi 50% artinya mesin diperkirakan cuma terisi separuh waktu yang tersedia, bukan penuh terus-menerus.</div>' +
                  '</span>' +
                '</span>' +
              '</div>' +
              kpiBlockHtml +
              mesinBlockHtml +
            '</div>'
          );
  }

  function renderDashboardMasterBiayaCard(res, targetId) {
        targetId = targetId || "dashboardMasterBiayaSummary";
        // Panel ringkasan eksekutif desktop ("desktopMasterBiaya") butuh
        // susunan 2 baris per item (baris 1: nama + nominal, baris 2: bar +
        // persen) - kartu ringkas HP ("dashboardMasterBiayaSummary") TETAP
        // pakai markup lama (.mb-komponen-top 1 baris) supaya HP TIDAK ikut
        // berubah sama sekali. isDesktopPanel dicek dari targetId, bukan
        // lebar layar, jadi aman.
        var isDesktopPanel = targetId === "desktopMasterBiaya";
        if (!res || !res.ok) {
          setDashboardCardError(targetId, res && res.error ? res.error : "Data master biaya belum bisa dibaca.");
          return;
        }

        var data = res.data || {};
        var rows = Array.isArray(data.rows) ? data.rows : [];

        if (!rows.length) {
          setDashboardCardHtml(targetId, '<div class="dashboard-empty">Belum ada outlet untuk dicek.</div>');
          return;
        }
        var shown = rows.slice(0, 1);
        var html = shown.map(function (row) {
          var komponen = Array.isArray(row.komponenBiaya) ? row.komponenBiaya : [];
          komponen.sort(function(a,b){ return (b.persen||0)-(a.persen||0); });
          var komponenHtml = komponen.map(function(k) {
            var isZero = !k.biayaPerLoad || k.biayaPerLoad === 0;
            var cls = isZero ? 'mb-komponen-row zero' : 'mb-komponen-row';
            var valueHtml = isZero ? '<span class="mb-zero-label">Rp 0 (tanpa biaya)</span>' : (money0(k.biayaPerLoad) + (k.unitSuffix ? ' <span class="mb-komponen-unit">' + escapeHtml(k.unitSuffix) + '</span>' : ''));
            var barHtml = '<div class="mb-progress-bar">' +
                '<div class="mb-progress-fill mb-' + escapeHtml(k.key) + '" style="width:' + String(Math.min(k.persen||0,100)) + '%"></div>' +
              '</div>' +
              '<span class="mb-komponen-persen">' + String(k.persen||0) + '%</span>';

            if (isDesktopPanel) {
              return '<div class="' + cls + ' mb-komponen-row-desktop">' +
                '<div class="mb-komponen-line1">' +
                  '<span class="mb-komponen-label">' + escapeHtml(k.label) + '</span>' +
                  '<span class="mb-komponen-value">' + valueHtml + '</span>' +
                '</div>' +
                '<div class="mb-komponen-line2">' + barHtml + '</div>' +
              '</div>';
            }

            return '<div class="' + cls + '">' +
              '<div class="mb-komponen-top">' +
                '<span class="mb-komponen-label">' + escapeHtml(k.label) + '</span>' +
                '<div class="mb-bar-wrap">' + barHtml + '</div>' +
                '<span class="mb-komponen-value">' + valueHtml + '</span>' +
              '</div>' +
            '</div>';
          }).join('');
          return '<div class="mb-card">' +
            (komponen.length > 0 ? '<div class="mb-komponen-list">' + komponenHtml + '</div>' : '') +
          '</div>';
        }).join('');
        setDashboardCardHtml(targetId, html);
  }

  function renderDashboardHPPCard(res) {
        if (!res || !res.ok) {
          setDashboardCardError("dashboardHppSummary", res && res.error ? res.error : "Data HPP belum bisa dibaca.");
          return;
        }
        var data = res.data || {};
        var rows = Array.isArray(data.rows) ? data.rows : [];
        if (!rows.length) {
          setDashboardCardHtml("dashboardHppSummary", '<div class="dashboard-empty">Belum ada outlet untuk dihitung HPP.</div>');
          return;
        }
        var shown = rows.slice(0, 1);
        var hppShortLabel = {
          air: 'Air',
          air_washer: 'Air Washer',
          air_setrika: 'Air Setrika',
          listrik_washer: 'Listrik Washer',
          listrik_pompa: 'Listrik Pompa',
          listrik_setrika: 'Listrik Setrika',
          app_nota: 'Nota',
          listrik_dryer: 'Listrik Dryer',
          gas_lpg: 'Gas',
          gas_dryer: 'Gas Dryer',
          gas_setrika: 'Gas Setrika',
          deterjen: 'Deterjen',
          softener: 'Softener',
          parfum: 'Parfum',
          packing: 'Packing',
          setrika: 'Setrika',
          hpp_cuci: 'HPP Cuci',
          hpp_kering: 'HPP Kering'
        };
        var html = shown.map(function (row) {
          var layananList = Array.isArray(row.layananList) ? row.layananList : [];
          var serviceToggles = Array.isArray(row.serviceToggles) ? row.serviceToggles : [];
          var toggleByKey = {};
          serviceToggles.forEach(function (t) { toggleByKey[t.key] = t; });
          var miniHtml = layananList.map(function (svc) {
            var components = Array.isArray(svc.components) ? svc.components : [];
            var isTogglable = !!toggleByKey[svc.key];
            var rowsHtml = components.map(function (c) {
              var lbl = hppShortLabel[c.key] || c.label || '';
              return '<div class="hpp-mini-row">' +
                '<span class="hpp-mini-row-label">' + escapeHtml(lbl) + '</span>' +
                '<span class="hpp-mini-row-percent">' + String(c.percent || 0) + '%</span>' +
                '<span class="hpp-mini-row-amount">' + money0(c.amount) + '</span>' +
              '</div>';
            }).join('');
            var toggleHtml = !isTogglable ? '' :
              '<div class="hpp-bedcover-toggle-row">' +
                '<span>Layanan aktif</span>' +
                '<button type="button" class="hpp-bedcover-toggle-btn" onclick="toggleHPPLayananAktif(\'' + escapeJsAttr(row.cabangId) + '\', \'' + escapeJsAttr(svc.key) + '\', false, event)">Matikan</button>' +
              '</div>';
            return '<div class="hpp-mini-card">' +
              '<div class="hpp-mini-head" onclick="toggleHppDetail(this, event)">' +
                '<span class="hpp-mini-title">' + escapeHtml(svc.title || '') + '</span>' +
                '<span class="hpp-mini-total">' + money0(svc.total) + '</span>' +
                '<span class="hpp-mini-arrow">&#9662;</span>' +
              '</div>' +
              (rowsHtml || toggleHtml ? '<div class="hpp-mini-detail">' + rowsHtml + toggleHtml + '</div>' : '') +
            '</div>';
          }).join('');
          var offHtml = serviceToggles.filter(function (t) { return t.aktif === false; }).map(function (t) {
            return '<div class="hpp-bedcover-off-row">' +
              '<span>Layanan ' + escapeHtml((t.title || '').replace(/^HPP /, '')) + ' nonaktif</span>' +
              '<button type="button" class="hpp-bedcover-toggle-btn" onclick="toggleHPPLayananAktif(\'' + escapeJsAttr(row.cabangId) + '\', \'' + escapeJsAttr(t.key) + '\', true, event)">Aktifkan</button>' +
            '</div>';
          }).join('');
          var emptyHtml = !layananList.length ? '<div class="dashboard-empty">HPP belum siap dihitung.</div>' : '';
          return (layananList.length > 0 ? '<div class="hpp-mini-list">' + miniHtml + '</div>' : emptyHtml) + offHtml;
        }).join('');
        setDashboardCardHtml('dashboardHppSummary', html);
  }
  // hlMarginTier_: bucketing 5-tingkat MURNI presentasi (emoji + label +
  // kelas warna) dari margin/marginPercent yang SUDAH dihitung backend -
  // tidak mengubah rumus margin sama sekali, cuma mengelompokkan angka yang
  // sama jadi label lebih granular utk Financial Decision Card (dulu cuma
  // 3 status: rugi/tipis/aman).
  function hlMarginTier_(margin, marginPercent) {
    var pct = typeof marginPercent === 'number' ? marginPercent : 0;
    if (Number(margin) < 0 || pct < 21) return { key: 'berisiko', emoji: '🔴', label: 'Margin Kurang Sehat' };
    if (pct <= 30) return { key: 'tipis', emoji: '🟠', label: 'Margin Tipis' };
    if (pct <= 49) return { key: 'cukup', emoji: '🟡', label: 'Margin Cukup' };
    if (pct <= 69) return { key: 'sehat', emoji: '🟢', label: 'Margin Sehat' };
    return { key: 'sangat-sehat', emoji: '🟢', label: 'Margin Sangat Sehat' };
  }

  // hlUnitLabel_: ubah "per load"/"per item"/"per kg" (field unitLabel yang
  // sudah ada) jadi label singkat "Load"/"Item"/"Kg" utk ditempel di angka.
  function hlUnitLabel_(unitLabel) {
    var u = String(unitLabel || '').replace(/^per\s+/i, '').trim();
    if (!u) return '';
    return u.charAt(0).toUpperCase() + u.slice(1);
  }

  function renderDashboardHargaLayananCard(res, targetId) {
        targetId = targetId || "dashboardHargaLayananSummary";
        var isDesktopPanelHl = targetId === "desktopHargaLayanan";
        function hlTrimDec_(x) { var s = (Math.round(x * 10) / 10).toFixed(1); if (s.slice(-2) === ".0") s = s.slice(0, -2); return s.replace(".", ","); }
        function hlMoneyCompact_(v) { var n = Number(v) || 0; var neg = n < 0; var a = Math.abs(n); var out = a >= 1000000 ? hlTrimDec_(a / 1000000) + "jt" : (a >= 1000 ? hlTrimDec_(a / 1000) + "rb" : String(Math.round(a))); return "Rp " + (neg ? "-" : "") + out; }
        function fmtStat(v) { return isDesktopPanelHl ? hlMoneyCompact_(v) : money0(v); }
        if (!res || !res.ok) {
          setDashboardCardError(targetId, res && res.error ? res.error : "Data harga layanan belum bisa dibaca.");
          return;
        }
        var data = res.data || {};
        var rows = Array.isArray(data.rows) ? data.rows : [];
        if (!rows.length) {
          setDashboardCardHtml(targetId, '<div class="dashboard-empty">Belum ada outlet untuk dicek harga layanan.</div>');
          return;
        }
        var d = rows[0];
        var list = Array.isArray(d.layananList) ? d.layananList : [];
        var html = '';
        if (!list.length) {
          html += '<div class="hl-empty">Belum ada harga yang diisi.</div>';
        } else {
          list.forEach(function (item) {
            var pct = typeof item.marginPercent === 'number' ? item.marginPercent : 0;
            var barW = Math.min(100, Math.max(0, pct));
            var tier = hlMarginTier_(item.margin, pct);
            var pctTxt = typeof item.marginPercent === 'number' ? (Math.round(item.marginPercent * 10) / 10) + '%' : '-';

            var detailRow = function (label, value) {
              return '<div class="hl-detail-row"><span class="hl-detail-label">' + escapeHtml(label) + '</span><span class="hl-detail-value">' + value + '</span></div>';
            };

            var isKiloanLoad = item.hppPerLoad !== undefined;
            var isSetrikaJam = item.hppPerJam !== undefined;
            var isKgBased = isKiloanLoad || isSetrikaJam;
            var hasMinOrder = item.minimumOrderKg !== undefined;
            // omzetMinimumOrder/item.margin-marginPercent HANYA berbasis
            // Minimum Order (bukan lagi Margin Per Kg) kalau Minimum Order
            // sudah diisi (>0) - lihat Modul_HargaLayanan.gs baris ~448-464.
            var minOrderFilled = hasMinOrder && item.minimumOrderKg > 0 && item.omzetMinimumOrder !== undefined;

            var headlineUnit = isKgBased ? 'Kg' : hlUnitLabel_(item.unitLabel);
            var headlineHarga = isKgBased ? item.hargaJualPerKg : item.hargaJual;

            // HPP Per Load adalah dasar seluruh analisis bisnis (bukan HPP
            // Per Kg lagi) - biaya produksi nyata utk 1 siklus mesin, angka
            // yang TIDAK berubah walau Minimum Order diubah-ubah.
            var hppSiklusLabel = isKiloanLoad ? 'HPP Per Load' : (isSetrikaJam ? 'HPP Per Jam' : ('HPP Per ' + (headlineUnit || 'Unit')));
            var hppSiklusValue = isKiloanLoad ? item.hppPerLoad : (isSetrikaJam ? item.hppPerJam : item.hpp);

            // Detail Perhitungan: grup "Per Load/Jam" (HPP, Margin, Margin %)
            // - inilah dasar rekomendasi sistem. Grup "Per Kg" tetap
            // ditampilkan sebagai INFO TAMBAHAN saja (bukan dasar keputusan).
            var siklusLabel = isKiloanLoad ? 'Load' : (isSetrikaJam ? 'Jam' : (headlineUnit || 'Unit'));
            var marginRows = (isKgBased && !minOrderFilled)
              ? '<div class="hl-detail-empty">Isi Minimum Order dulu untuk melihat Margin Per ' + escapeHtml(siklusLabel) + '.</div>'
              : detailRow('Margin Per ' + siklusLabel, money0(item.margin)) +
                detailRow('Margin %', formatPercent(item.marginPercent, 1));
            var perKgGroup = !isKgBased ? '' :
              '<div class="hl-detail-group hl-detail-group-kg">' +
                '<div class="hl-detail-group-title">Perhitungan Per Kg <span class="hl-detail-group-hint">&middot; info tambahan</span></div>' +
                detailRow('HPP Per Kg', money0(item.hppPerKg)) +
                detailRow('Margin Per Kg', money0(item.marginPerKg)) +
                detailRow('Margin %', formatPercent(item.marginPercentPerKg, 1)) +
              '</div>';
            var detailHtml =
              '<div class="hl-detail-title">Detail Perhitungan</div>' +
              '<div class="hl-detail-group hl-detail-group-load">' +
                '<div class="hl-detail-group-title">Perhitungan Per ' + escapeHtml(siklusLabel) + '</div>' +
                detailRow(hppSiklusLabel, money0(hppSiklusValue)) +
                marginRows +
              '</div>' +
              perKgGroup;

            // Kolom ke-3 ringkasan atas: Minimum Order (layanan berbasis Kg,
            // dasar strategi penjualan) - kalau tidak ada konsep ini (Self
            // Service/Bed Cover), tampilkan Laba Bersih spt sebelumnya.
            var thirdStatLabel = hasMinOrder ? 'Min Order' : 'Laba Bersih';
            var thirdStatValue = hasMinOrder
              ? (item.minimumOrderKg > 0 ? formatNum(item.minimumOrderKg, 1) + ' Kg' : 'Belum diisi')
              : fmtStat(isKgBased ? item.marginPerKg : item.margin) + '<span class="hl-stat-unit"> /' + escapeHtml(headlineUnit) + '</span>';

            html += '<div class="hl-item">' +
              '<div class="hl-top">' +
                '<span class="hl-name">' + escapeHtml(item.title || '') + '</span>' +
                '<span class="hl-status-badge hl-status-' + tier.key + '">' + tier.emoji + ' ' + escapeHtml(tier.label) + '</span>' +
              '</div>' +
              '<div class="hl-bar-row">' +
                '<div class="hl-bar-wrap"><div class="hl-bar hl-tier-' + tier.key + '" style="width:' + barW + '%"></div></div>' +
                '<span class="hl-bar-pct">' + escapeHtml(pctTxt) + '</span>' +
              '</div>' +
              '<div class="hl-stat-grid">' +
                '<div class="hl-stat"><span class="hl-stat-label">Harga Jual</span><span class="hl-stat-value" title="' + escapeHtml(money0(headlineHarga)) + '">' + fmtStat(headlineHarga) + '<span class="hl-stat-unit"> /' + escapeHtml(headlineUnit) + '</span></span></div>' +
                '<div class="hl-stat"><span class="hl-stat-label">' + escapeHtml(hppSiklusLabel) + '</span><span class="hl-stat-value hl-stat-hpp" title="' + escapeHtml(money0(hppSiklusValue)) + '">' + fmtStat(hppSiklusValue) + '</span></div>' +
                '<div class="hl-stat hl-stat-toggle">' +
                  '<span class="hl-stat-label">' + escapeHtml(thirdStatLabel) + '</span>' +
                  '<div class="hl-stat-value-row">' +
                    '<span class="hl-stat-value hl-stat-profit">' + thirdStatValue + '</span>' +
                    '<span class="hl-arrow hl-arrow-sm" onclick="toggleHlDetail(this, event)">&#9662;</span>' +
                  '</div>' +
                '</div>' +
              '</div>' +
              '<div class="hl-detail">' + detailHtml + '</div>' +
            '</div>';
          });
          if ((d.hargaTerisiCount || 0) < (d.totalLayanan || 0)) {
            html += '<div class="hl-note">' + ((d.totalLayanan || 0) - (d.hargaTerisiCount || 0)) + ' layanan belum diisi harga</div>';
          }
        }
        setDashboardCardHtml(targetId, html);
  }

  function renderDashboardFixedCostCard(res, targetId) {
        targetId = targetId || "dashboardFixedCostSummary";
        if (!res || !res.ok) {
          setDashboardCardError(targetId, res && res.error ? res.error : "Data fixed cost belum bisa dibaca.");
          return;
        }
        var data = res.data || {};
        var rows = Array.isArray(data.rows) ? data.rows : [];
        if (!rows.length) {
          setDashboardCardHtml(targetId, '<div class="dashboard-empty">Belum ada outlet untuk fixed cost.</div>');
          return;
        }
        var d = rows[0];
        var components = Array.isArray(d.components) ? d.components : [];
        var totalPerBulan = toNumber(d.totalPerBulan, 0);
        var detailHtml = components.map(function (c) {
          var amount = toNumber(c.amount, 0);
          var percent = (totalPerBulan > 0 && amount > 0) ? round2((amount / totalPerBulan) * 100) : 0;
          return '<div class="fc-detail-row">' +
            '<span class="fc-detail-label">' + escapeHtml(c.label || '') + '</span>' +
            '<span class="fc-detail-percent">' + percent + '%</span>' +
            '<span class="fc-detail-value">' + money0(c.amount) + '</span>' +
          '</div>';
        }).join('');
        var html =
          '<div class="fc-card">' +
            '<div class="fc-main-row" onclick="toggleFcDetail(this, event)">' +
              '<span class="fc-main">' + money0(d.totalPerBulan || 0) + '</span>' +
              '<span class="fc-main-unit">per bulan</span>' +
              '<span class="fc-arrow">&#9662;</span>' +
            '</div>' +
            '<div class="fc-divider"></div>' +
            '<div class="fc-hari">' +
              '<span class="fc-hari-label">Estimasi per hari</span>' +
              '<span class="fc-hari-val">' + money0(d.totalPerHari || 0) + '</span>' +
            '</div>' +
            (detailHtml ? '<div class="fc-detail">' + detailHtml + '</div>' : '') +
          '</div>';
        setDashboardCardHtml(targetId, html);
  }
  function renderDashboardBEPCard(res) {
        if (!res || !res.ok) {
          setDashboardCardError("dashboardBEPSummary", res && res.error ? res.error : "Data BEP belum bisa dihitung.");
          return;
        }
        var d = res.data || {};
        var warnings = Array.isArray(d.warnings) ? d.warnings : [];
        var html = "";

        bepMixCurrentServices = Array.isArray(d.serviceMix) ? d.serviceMix : [];

        if (d.bepLoadPerBulan <= 0) {
          html = '<div class="bep-incomplete">' +
            '<div class="bep-incomplete-title">Data belum lengkap</div>' +
            '<div class="bep-incomplete-list">' +
              warnings.map(function(w) { return '<span>' + escapeHtml(w) + '</span>'; }).join("") +
            '</div>' +
          '</div>';
        } else {
          var chartSvg = buildBepChartSvg(d);
          html = '<div class="bep-card">' +
            '<div class="bep-hero-row-cards">' +
              '<div class="bep-hero-item">' +
                '<span class="bep-hero-item-label">Target BEP Load</span>' +
                '<div class="bep-hero-item-value">' + escapeHtml(formatNum(d.bepLoadPerBulan, 0)) + '<span class="bep-hero-item-unit">load/bulan</span></div>' +
              '</div>' +
              '<div class="bep-hero-item">' +
                '<span class="bep-hero-item-label">Target BEP Omset</span>' +
                '<div class="bep-hero-item-value bep-hero-item-value-omset">' + money0(d.bepOmsetPerBulan) + '</div>' +
              '</div>' +
            '</div>' +
            (chartSvg ? '<div class="bep-chart-wrap">' + chartSvg +
              '<div class="bep-chart-legend">' +
                '<span class="bep-legend-item"><span class="bep-legend-dot sage"></span>Omset</span>' +
                '<span class="bep-legend-item"><span class="bep-legend-dot brass"></span>Total Biaya</span>' +
              '</div>' +
            '</div>' : '') +
            '<div class="bep-section">' +
              '<div class="bep-row">' +
                '<div class="bep-item bep-item-sub">' +
                  '<span class="bep-label">Load / Minggu</span>' +
                  '<span class="bep-value">' + escapeHtml(formatNum(d.bepLoadPerMinggu, 0)) + '</span>' +
                '</div>' +
                '<div class="bep-item bep-item-sub">' +
                  '<span class="bep-label">Omset / Minggu</span>' +
                  '<span class="bep-value bep-omset">' + money0(d.bepOmsetPerMinggu) + '</span>' +
                '</div>' +
              '</div>' +
              '<div class="bep-row">' +
                '<div class="bep-item bep-item-sub">' +
                  '<span class="bep-label">Load / Hari</span>' +
                  '<span class="bep-value">' + escapeHtml(formatNum(d.bepLoadPerHari, 0)) + '</span>' +
                '</div>' +
                '<div class="bep-item bep-item-sub">' +
                  '<span class="bep-label">Omset / Hari</span>' +
                  '<span class="bep-value bep-omset">' + money0(d.bepOmsetPerHari) + '</span>' +
                '</div>' +
              '</div>' +
            '</div>' +
            (warnings.length > 0 ? '<div class="bep-warning">' + warnings.map(function(w) { return escapeHtml(w); }).join(" · ") + '</div>' : "") +
          '</div>';
        }
        setDashboardCardHtml("dashboardBEPSummary", html);
  }

  function renderDashboardPotensiOmsetCard(res) {
        if (!res || !res.ok) {
          setDashboardCardError("dashboardPotensiOmsetSummary", res && res.error ? res.error : "Potensi omset belum bisa dihitung.");
          return;
        }
        var d = res.data || {};
        var warnings = Array.isArray(d.warnings) ? d.warnings : [];
        var serviceMix = Array.isArray(d.serviceMix) ? d.serviceMix : [];

        var mixListHtml = serviceMix.map(function (s) {
          var unitLabel = s.unit === 'kg' ? 'Kg' : 'Load';
          var detailHtml =
            '<div class="potensi-mix-detail-row"><span class="potensi-mix-detail-label">Jumlah Transaksi (' + escapeHtml(formatNum(s.percent, 0)) + '% dari total)</span><span class="potensi-mix-detail-value">' + formatNum(s.jumlahTransaksi) + '</span></div>' +
            '<div class="potensi-mix-detail-row"><span class="potensi-mix-detail-label">Kapasitas</span><span class="potensi-mix-detail-value">' + formatNum(s.kapasitasKontribusi) + ' ' + escapeHtml(unitLabel) + '</span></div>' +
            '<div class="potensi-mix-detail-row"><span class="potensi-mix-detail-label">Harga Layanan</span><span class="potensi-mix-detail-value">' + money0(s.hargaPerUnit) + ' / ' + escapeHtml(unitLabel) + '</span></div>' +
            '<div class="potensi-mix-detail-row potensi-mix-detail-highlight"><span class="potensi-mix-detail-label">Estimasi Omset</span><span class="potensi-mix-detail-value">' + money0(s.omzetLayanan) + '</span></div>' +
            '<div class="potensi-mix-detail-row"><span class="potensi-mix-detail-label">HPP Layanan</span><span class="potensi-mix-detail-value">' + money0(s.hppPerUnit) + ' / ' + escapeHtml(unitLabel) + '</span></div>' +
            '<div class="potensi-mix-detail-row"><span class="potensi-mix-detail-label">Estimasi Biaya Produksi</span><span class="potensi-mix-detail-value">' + money0(s.biayaLayanan) + '</span></div>';

          return '<div class="potensi-mix-item">' +
            '<div class="potensi-mix-row" onclick="togglePotensiMixDetail(this, event)">' +
              '<span class="potensi-mix-row-title">' + escapeHtml(s.title || s.key) + '</span>' +
              '<span class="potensi-mix-row-percent">' + escapeHtml(formatNum(s.percent, 0)) + '%</span>' +
              '<span class="potensi-mix-arrow">&#9662;</span>' +
            '</div>' +
            '<div class="potensi-mix-detail">' + detailHtml + '</div>' +
          '</div>';
        }).join('');

        var html = "";
        if (!d.maksimalTransaksiPerBulan || d.maksimalTransaksiPerBulan <= 0) {
          html = '<div class="bep-incomplete">' +
            '<div class="bep-incomplete-title">Data belum lengkap</div>' +
            '<div class="bep-incomplete-list">' +
              warnings.map(function(w) { return '<span>' + escapeHtml(w) + '</span>'; }).join("") +
            '</div>' +
          '</div>';
        } else {
          html = '<div class="potensi-card">' +
            '<div class="potensi-estimate">' +
              '<div class="potensi-estimate-row"><span class="potensi-estimate-label">Estimasi Omset</span><span class="potensi-estimate-value">' + money0(d.estimasiOmsetPerBulan) + '</span></div>' +
              '<div class="potensi-estimate-row"><span class="potensi-estimate-label">Biaya Produksi (Variable Cost)</span><span class="potensi-estimate-value potensi-estimate-minus">&minus; ' + money0(d.estimasiBiayaProduksiPerBulan) + '</span></div>' +
              '<div class="potensi-estimate-row"><span class="potensi-estimate-label">Biaya Operasional (Fixed Cost)</span><span class="potensi-estimate-value potensi-estimate-minus">&minus; ' + money0(d.fixedCostPerBulan) + '</span></div>' +
              '<div class="potensi-estimate-row potensi-estimate-row-profit"><span class="potensi-estimate-label">Estimasi Profit</span><span class="potensi-estimate-value ' + (d.estimasiProfitPerBulan >= 0 ? 'potensi-profit-pos' : 'potensi-profit-neg') + '">' + money0(d.estimasiProfitPerBulan) + '</span></div>' +
            '</div>' +
            (mixListHtml ? '<div class="potensi-mix-list">' +
              '<div class="potensi-mix-head" onclick="togglePotensiMixList(this, event)">' +
                '<span class="potensi-mix-title">Kontribusi Omset per Layanan</span>' +
                '<span class="potensi-mix-list-arrow">&#9662;</span>' +
              '</div>' +
              '<div class="potensi-mix-list-body">' + mixListHtml + '</div>' +
            '</div>' : '') +
            (warnings.length > 0 ? '<div class="bep-warning">' + warnings.map(function(w) { return escapeHtml(w); }).join(" · ") + '</div>' : "") +
            '<div class="potensi-basis-note">' +
              '<div class="potensi-basis-head" onclick="togglePotensiBasisNote(this, event)">' +
                '<span class="potensi-basis-title">Dasar Perhitungan</span>' +
                '<span class="potensi-basis-arrow">&#9662;</span>' +
              '</div>' +
              '<div class="potensi-basis-text">' +
                'Outlet ini diperkirakan sanggup melayani maksimal <b>' + formatNum(d.maksimalTransaksiPerBulan, 0) + ' transaksi/bulan</b>, dibatasi mesin (cuci/pengering/setrika) yang paling cepat penuh sesuai campuran Kontribusi % tiap layanan. Jumlah transaksi itu dibagi ke tiap layanan sesuai Kontribusi %-nya, dikonversi ke Kg pakai Minimum Order (utk layanan Kiloan), lalu dikalikan Harga Layanan (jadi Estimasi Omset) dan HPP (jadi Estimasi Biaya Produksi). Estimasi Profit = Omset &minus; Biaya Produksi &minus; Biaya Operasional.' +
              '</div>' +
            '</div>' +
          '</div>';
        }
        setDashboardCardHtml("dashboardPotensiOmsetSummary", html);
  }

  window.openBepMix = function () {
    if (!dashboardSelectedOutletId || !bepMixCurrentServices.length) return;
    renderBepMixList_();
    var overlay = document.getElementById("bepMixOverlay");
    if (overlay) overlay.classList.add("show");
  };

  window.closeBepMix = function () {
    var overlay = document.getElementById("bepMixOverlay");
    if (overlay) overlay.classList.remove("show");
  };

  function renderBepMixList_() {
    var container = document.getElementById("bepMixList");
    if (!container) return;
    container.innerHTML = bepMixCurrentServices.map(function (s) {
      return '<div class="bep-mix-row">' +
        '<span class="bep-mix-row-title">' + escapeHtml(s.title || s.key) + '</span>' +
        '<div class="bep-mix-row-input">' +
          '<input type="number" min="0" max="100" step="1" value="' + escapeHtml(String(s.percent || 0)) + '" data-bep-mix-key="' + escapeJsAttr(s.key) + '" oninput="updateBepMixTotal()">' +
          '<span class="bep-mix-row-percent-sign">%</span>' +
        '</div>' +
      '</div>';
    }).join('');
    updateBepMixTotal();
  }

  window.updateBepMixTotal = function () {
    var inputs = document.querySelectorAll('#bepMixList input[data-bep-mix-key]');
    var total = 0;
    inputs.forEach(function (inp) { total += toNumber(inp.value, 0); });
    var totalEl = document.getElementById("bepMixTotal");
    if (!totalEl) return;
    var rounded = round2(total);
    var isOk = Math.round(total) === 100;
    totalEl.textContent = "Total: " + formatNum(rounded, 0) + "%" + (isOk ? "" : " (akan dinormalisasi otomatis ke 100%)");
    totalEl.className = "bep-mix-total" + (isOk ? " is-ok" : "");
  };

  window.saveBepMix = function () {
    if (!dashboardSelectedOutletId) return;
    var inputs = document.querySelectorAll('#bepMixList input[data-bep-mix-key]');
    var mixMap = {};
    inputs.forEach(function (inp) {
      mixMap[inp.getAttribute("data-bep-mix-key")] = toNumber(inp.value, 0);
    });

    var saveBtn = document.getElementById("bepMixSaveBtn");
    if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = "Menyimpan..."; }

    google.script.run
      .withSuccessHandler(function (res) {
        if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = "Simpan"; }
        if (!res || !res.ok) {
          handleBackendError(res, "menyimpan mix kontribusi layanan BEP");
          return;
        }
        showToast("Mix kontribusi layanan berhasil disimpan.", "ok");
        closeBepMix();
        refreshDashboard(true);
      })
      .withFailureHandler(function (err) {
        if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = "Simpan"; }
        handleBackendError(
          { error: err && err.message ? err.message : String(err), stage: "client:saveBepServiceMix" },
          "menyimpan mix kontribusi layanan BEP"
        );
      })
      .saveBepServiceMix(dashboardSelectedOutletId, mixMap);
  };
</script>
