<!--
===============================================================================
FILE: Style_Module_Dashboard.html  (FILE UTAMA / BAGIAN 1 dari 9)
PROJECT: Kalkulator Laundry Versi 002
===============================================================================
PETA FILE STYLE DASHBOARD (dipecah 2026-07-11 agar mudah cari bug & tambah fitur)
File Style_Module_Dashboard yang dulu 1 file besar kini DIPECAH jadi 9 file.
URUTAN include() di Index.html WAJIB persis seperti daftar ini (cascade CSS
bergantung urutan; file "DesktopDensity" WAJIB paling akhir karena isinya
override kepadatan yang menimpa aturan di atasnya):

  1. Style_Module_Dashboard.html .............. (file ini) layout ringkasan
     eksekutif KHUSUS desktop (>=1100px): .desktop-dashboard-summary, baris KPI,
     topbar, kunci 1 layar, + override desktop utk BEP/MasterBiaya/HargaLayanan.
  2. Style_Module_Dashboard_Menu.html ......... menu utama, dashboard-header,
     outlet-filter-pill, judul/subjudul, kartu generik dashboard.
  3. Style_Module_Dashboard_ProfilOutlet.html . kartu Profil Outlet (KPI mesin,
     okupansi, dll).
  4. Style_Module_Dashboard_BEP.html .......... kartu BEP (grafik, hero, mix).
  5. Style_Module_Dashboard_Potensi.html ...... kartu Potensi Omset.
  6. Style_Module_Dashboard_MasterBiaya.html .. kartu Master Biaya (komponen,
     progress bar).
  7. Style_Module_Dashboard_KPIFooter.html .... dashboard-kpi kecil, daftar
     outlet, footer-bar, + FIX overflow khusus HP.
  8. Style_Module_Dashboard_HargaLayanan.html . kartu Harga Layanan + Fixed Cost
     (hl-*, fc-*).
  9. Style_Module_Dashboard_DesktopDensity.html  OVERRIDE kepadatan desktop
     (WAJIB DI-INCLUDE PALING AKHIR).

CATATAN: tiap file dibungkus <style>...</style> sendiri, jadi TIDAK BOLEH ada
rule CSS yang terpotong antar file. Kalau tambah file baru, sisipkan include()
pada posisi yang benar & jangan pindahkan file DesktopDensity dari urutan akhir.
===============================================================================
ISI FILE INI: layout ringkasan eksekutif dashboard KHUSUS desktop (>=1100px).
===============================================================================
-->
<style>
/* MENU UTAMA (gerbang sebelum daftar cabang / Master Biaya)              */
  /* ---------------------------------------------------------------------- */
  .menu-grid { display: flex; flex-direction: column; gap: 12px; }

  /* HP/tablet portrait (<1100px): 7 card ringkasan (.dashboard-grid) apa
     adanya, TIDAK DIUBAH SAMA SEKALI. Ringkasan eksekutif desktop
     (.desktop-dashboard-summary) disembunyikan total di lebar ini. */
  .desktop-dashboard-summary { display: none; }

  /* Dashboard di layar lebar (tablet lanskap/laptop/PC, >=1100px sama
     dengan breakpoint 2-kolom form Profil Outlet): .dashboard-grid (7 card
     versi HP) diganti tampilannya dgn ringkasan eksekutif 1 halaman (5 KPI
     + grafik BEP + Master Biaya berdampingan + Harga Layanan) - Profil
     Outlet & Struktur HPP tetap ada, dibuka lewat sidebar (lihat
     Screen_Sidebar.html), bukan di halaman ringkasan ini lagi. */
  body:has(#screenMenu.active) .wrap { width: min(100%, 1600px); }

  @media (min-width: 1100px) {
    #screenMenu .dashboard-grid { display: none; }

    /* Header app ("Kalkulator Laundry" + icon) sudah ada duplikatnya di
       sidebar (Screen_Sidebar.html) - di Dashboard header ini dibuang total
       supaya konten naik ke atas (tidak ada baris kosong sisa) & tidak
       ada branding dobel. DIBATASI ke #screenMenu.active saja - layar lain
       (Profil Outlet, Master Biaya, dst) TETAP pakai header spt biasa krn
       masih butuh tombol Kembali. HP tidak pernah masuk media query ini. */
    body:has(#screenMenu.active) .app-header { display: none !important; }

    /* === PAKSA 1 LAYAR PENUH TANPA SCROLL (khusus Dashboard desktop) ===
       Percobaan sebelumnya pakai rantai CSS murni (html/body/.wrap/#appRoot
       height:100vh + overflow:hidden berantai) TERBUKTI RAPUH - ada aturan
       spec CSS "overflow propagation" yang bikin body:overflow:hidden saja
       tidak selalu menghentikan scroll viewport begitu html sudah punya
       overflow-x sendiri (lihat Style_Base.html), plus konteks Apps Script
       kadang beda perilaku. Diganti total: tinggi panel ini sekarang
       DIUKUR & DIKUNCI langsung via JavaScript (fitDesktopDashboardToViewport_
       di Script_Fitur_Dashboard.html, dipanggil tiap ganti layar & resize)
       pakai window.innerHeight yang selalu akurat - jauh lebih pasti drpd
       vh/overflow CSS. CSS di sini cuma menyiapkan strukturnya: topbar &
       baris KPI tetap tinggi natural (flex-shrink:0), baris BEP+Master
       Biaya jadi elemen elastis (flex:1) yg menyesuaikan ke sisa ruang
       DALAM tinggi yang sudah dikunci JS tsb. */
    .desktop-dashboard-summary { display: flex; flex-direction: column; gap: 14px; overflow: hidden; }
    .desktop-kpi-row { flex-shrink: 0; }
    .desktop-summary-row { flex: 1; min-height: 340px; }
    .desktop-summary-full { flex-shrink: 0; }

    /* Topbar tipis khusus desktop: header dashboard jadi strip putih (var
       --panel) presisi dgn border halus - spt topbar Stripe/Linear/Vercel -
       bukan blok judul besar vertikal spt versi HP. Subjudul "Ringkasan
       kondisi outlet Anda saat ini" dihapus di sini krn sudah cukup jelas
       dari konteks topbar. Padding/margin dikecilkan lagi supaya konten
       naik lebih tinggi. #screenMenu discope supaya HP (.dashboard-header
       tetap dipakai bareng, tapi HP selalu <1100px) tidak ikut berubah. */
    #screenMenu .dashboard-header {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 18px;
      margin-bottom: 14px;
      box-shadow: 0 1px 2px rgba(17,24,39,0.03);
    }
    #screenMenu .dashboard-header-top { align-items: center; }
    #screenMenu .dashboard-eyebrow { display: none; }
    #screenMenu .dashboard-title { font-size: 16px; margin-bottom: 0; letter-spacing: -0.01em; }
    #screenMenu .dashboard-subtitle { display: none; }

    /* Hero KPI row: card lebih tinggi & lega (bukan 5 card datar spt
       sebelumnya) - label jadi info sekunder kecil, angka jadi fokus utama
       dgn hierarki 2 baris (prefix "Rp" kecil di atas, angka besar di
       bawah) utk KPI berbasis Rupiah - lihat setDesktopKpiMoney_ di
       Script_Fitur_Dashboard.html. Kartu ringkas HP (.dashboard-kpi) TIDAK
       memakai class desktop-kpi-* sama sekali jadi tidak ikut berubah. */
    .desktop-kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 18px; }
    .desktop-kpi-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 26px 22px 24px;
      min-width: 0;
      box-shadow: 0 1px 2px rgba(17,24,39,0.03), 0 10px 24px -12px rgba(17,24,39,0.12);
    }
    .desktop-kpi-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-faint);
      margin-bottom: 18px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .desktop-kpi-value {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }
    .desktop-kpi-currency {
      font-family: var(--font-body);
      font-size: 11.5px;
      font-weight: 600;
      color: var(--text-faint);
      letter-spacing: 0.02em;
    }
    .desktop-kpi-number {
      font-family: var(--font-display);
      /* clamp, bukan angka tetap 30px - supaya angka 7 digit (mis.
         "7.065.000") TIDAK terpotong "..." di jendela browser yang tidak
         selebar 1600px penuh (mis. laptop/window kecil) - ukuran ikut
         menyesuaikan lebar kartu, tetap besar & presisi di layar lebar. */
      font-size: clamp(18px, 1.5vw, 27px);
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1.08;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .desktop-kpi-number-row {
      display: flex;
      align-items: baseline;
      gap: 5px;
      min-width: 0;
    }
    .desktop-kpi-unit {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-faint);
      flex-shrink: 0;
    }
    .kpi-omset .desktop-kpi-number { color: var(--sage); }
    .kpi-bep-load .desktop-kpi-number,
    .kpi-bep-omset .desktop-kpi-number { color: var(--brass); }
    .kpi-fixed-cost .desktop-kpi-number { color: var(--text-dim); }
    .desktop-kpi-value.pos .desktop-kpi-number { color: var(--sage); }
    .desktop-kpi-value.neg .desktop-kpi-number { color: var(--red); }

    /* Grafik BEP dilebarkan lagi (2.4fr), Master Biaya dikecilkan lagi (0.9fr).
       align-items diganti dari "start" ke "stretch" supaya panel BEP & Master
       Biaya SELALU sama tinggi (diminta user), tidak lagi ikut tinggi konten
       masing-masing. Kedua panel dijadikan flex column supaya body-nya
       (#desktopBepChart / #desktopMasterBiaya) bisa flex:1 mengisi penuh
       tinggi panel - dasar dari pola "paksa 1 layar" di bawah. */
    .desktop-summary-row { display: grid; grid-template-columns: 2.4fr 0.9fr; gap: 20px; align-items: stretch; }
    .desktop-summary-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px 22px 20px;
      overflow: hidden;
      min-width: 0;
      display: flex;
      flex-direction: column;
      box-shadow: 0 1px 2px rgba(17,24,39,0.03), 0 10px 24px -12px rgba(17,24,39,0.12);
    }
    /* DIBATASI ke ".desktop-summary-row" saja (panel BEP & Master Biaya) -
       kalau ditulis tanpa scope ini, rule "flex-direction:column" ini
       KEBOCORAN ke panel Harga Layanan (.desktop-summary-full JUGA punya
       class .desktop-summary-panel) & merusak barisnya jadi tersusun ke
       bawah - itu penyebab bug "Harga Layanan lurus ke bawah" sebelumnya. */
    .desktop-summary-row .desktop-summary-panel > .dashboard-card-summary { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .desktop-summary-full { width: 100%; }

    /* === CHART BEP - restyle premium KHUSUS panel desktop (#desktopBepChart) ===
       buildBepChartSvg() di Script_Shared_Util.html dipakai bareng kartu
       ringkas HP (#dashboardBEPSummary) - markup SVG-nya TIDAK diubah (JS
       tetap sama) supaya HP tidak ikut berubah. Semua polesan visual di
       sini murni CSS yang di-scope ke id panel desktop saja: CSS menang
       atas atribut presentasi SVG (stroke-width dll) jadi aman menimpa
       tanpa sentuh JS. */
    #desktopBepChart .bep-chart-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: linear-gradient(180deg, var(--panel-2) 0%, var(--panel) 100%);
      border-radius: 12px;
      padding: 14px 14px 10px;
      box-shadow: none;
    }
    #desktopBepChart .bep-chart-svg line { stroke-width: 1.3; }
    #desktopBepChart .bep-chart-svg text { font-family: var(--font-mono); letter-spacing: 0.01em; }
    #desktopBepChart .bep-chart-svg polygon { opacity: 0.92; }
    #desktopBepChart .bep-chart-legend { gap: 22px; margin-top: 10px; flex-shrink: 0; }
    #desktopBepChart .bep-legend-item { font-size: 11px; font-weight: 600; letter-spacing: 0.02em; }
    #desktopBepChart .bep-legend-dot { width: 7px; height: 7px; }
    /* Grafik BEP di panel desktop: .bep-chart-svg bawaan (dipakai bareng
       kartu ringkas HP) tingginya fixed 120px, dulu dipaksa 300px KHUSUS
       di sini - sekarang diganti flex:1 (elastis, bukan angka tetap)
       supaya otomatis menyesuaikan ke sisa tinggi viewport (bagian dari
       pola "paksa 1 layar" di atas, jadi presisi di layar manapun tanpa
       perlu redesign ulang tiap ukuran layar). preserveAspectRatio="none"
       pada SVG-nya (lihat buildBepChartSvg di Script_Shared_Util.html)
       memang didesain utk skenario tinggi fleksibel spt ini - kartu
       ringkas HP (#dashboardBEPSummary) TIDAK ikut berubah krn scoped ke
       id ini saja. */
    #desktopBepChart .bep-chart-svg { flex: 1; min-height: 0; height: auto; }

    /* === MASTER BIAYA - susunan 2 baris per item + tinggi disamakan dgn
       panel BEP di sebelahnya (via flex:1 dari .desktop-summary-panel di
       atas) KHUSUS panel desktop (#desktopMasterBiaya). .mb-* dipakai
       bareng kartu ringkas HP (#dashboardMasterBiayaSummary) - style
       global .mb-* & markup .mb-komponen-top (1 baris) TIDAK diubah, HP
       tetap pakai versi lama. Baris item di sini pakai class baru
       (.mb-komponen-row-desktop/.mb-komponen-line1/line2, lihat
       Script_Fitur_Dashboard.html) supaya tidak numpang di CSS HP sama
       sekali. */
    #desktopMasterBiaya .mb-card { flex: 1; min-height: 0; display: flex; flex-direction: column; }
    #desktopMasterBiaya .mb-komponen-list {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 10px;
    }
    #desktopMasterBiaya .mb-komponen-row-desktop { display: flex; flex-direction: column; gap: 8px; }
    #desktopMasterBiaya .mb-komponen-line1 { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
    #desktopMasterBiaya .mb-komponen-line1 .mb-komponen-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      width: auto;
      white-space: nowrap;
      overflow: visible;
      text-overflow: clip;
    }
    #desktopMasterBiaya .mb-komponen-line1 .mb-komponen-value {
      font-size: 13.5px;
      font-weight: 700;
      color: var(--text);
      width: auto;
      font-variant-numeric: tabular-nums;
    }
    #desktopMasterBiaya .mb-komponen-line2 { display: flex; align-items: center; gap: 8px; }
    #desktopMasterBiaya .mb-komponen-line2 .mb-progress-bar { flex: 1; height: 8px; border-radius: 999px; }
    #desktopMasterBiaya .mb-komponen-line2 .mb-progress-fill { border-radius: 999px; transition: width 0.4s ease; }
    #desktopMasterBiaya .mb-komponen-line2 .mb-komponen-persen { font-size: 11px; width: 36px; flex-shrink: 0; text-align: right; }
    #desktopMasterBiaya .mb-komponen-row-desktop.zero .mb-komponen-line1 { opacity: 0.45; }

    /* Harga Layanan di panel ringkasan desktop: SELALU 1 baris sejajar
       berapa pun jumlah kartunya (flex nowrap, bukan grid auto-fit yang
       bisa pecah ke baris baru) - DIBATASI ke #desktopHargaLayanan saja,
       .hl-item di card ringkas HP (#dashboardHargaLayananSummary) TIDAK
       ikut berubah. */
    #desktopHargaLayanan {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      gap: 12px;
      align-items: start;
    }
    #desktopHargaLayanan .hl-item { margin-bottom: 0; flex: 1 1 0; min-width: 0; }
    #desktopHargaLayanan .hl-note { flex-shrink: 0; }

    .desktop-panel-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 14px;
    }
  }
</style>
