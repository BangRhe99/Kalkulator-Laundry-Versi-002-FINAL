<!--
===============================================================================
FILE: Script_Fitur_BiayaNotaKasir.html
PROJECT: Kalkulator Laundry Versi 002
ISI: Fitur Master Biaya > Nota Kasir

FUNGSI:
Form konfigurasi biaya nota/kasir per cabang (sistem POS, metode bayar), preview & simpan.

PENTING -- catat sebelum edit:
Semua file Script_*.html berbagi SATU scope global yang sama (Apps Script
include() cuma menggabungkan teks mentah jadi satu <script> demi <script>
di halaman yang sama -- bukan module system). Karena itu file ini SENGAJA
TIDAK dibungkus (function(){...})() -- kalau kamu bungkus lagi, fungsi di
file ini jadi tidak kelihatan dari file lain dan app akan rusak.
Urutan include TIDAK masalah untuk deklarasi function/var (hoisting),
TAPI Script_Boot_Main.html WAJIB tetap paling terakhir karena dia yang
menjalankan bootApp().
===============================================================================
-->
<script>
"use strict";
  function openNotaKasirForm(cabangId) {
    view.notaKasirCabangId = cabangId;
    notaKasirCabangCache = getCabangLiteFromCache(cabangId);
    notaKasirFormState = defaultNotaKasirRecordClient(cabangId);

    showScreen("notaKasirForm");
    document.getElementById("notaKasirTitle").textContent =
      "Nota" + (notaKasirCabangCache.namaLaundry ? " · " + notaKasirCabangCache.namaLaundry : "");
    renderNotaKasirForm();
    setSaveStatus("", "");

    // SWR "render sekali": kalau data outlet ini sudah di cache, isi form
    // INSTAN; hasil server belakangan tidak menimpa form (notaKasirRendered)
    // supaya ketikan aman. (Default "mode cepat" sudah dirender di atas.)
    var notaKasirRendered = false;
    cachedServerRead_("getBiayaNotaKasir", cabangId, function (res, fromCache) {
      if (view.notaKasirCabangId !== cabangId || view.screen !== "notaKasirForm") return;
      if (!res || !res.ok) {
        if (!fromCache) {
          showToast("Data nota/kasir belum bisa dimuat. Mode cepat digunakan.", "err");
          setSaveStatus("", "");
        }
        return;
      }
      if (!fromCache && notaKasirRendered) return;
      notaKasirCabangCache = res.data.cabang || notaKasirCabangCache;
      notaKasirFormState = res.data.record || notaKasirFormState;
      document.getElementById("notaKasirTitle").textContent =
        "Nota" + (notaKasirCabangCache.namaLaundry ? " · " + notaKasirCabangCache.namaLaundry : "");
      renderNotaKasirForm();
      setSaveStatus("", "");
      notaKasirRendered = true;
    }, function (err, hadCache) {
      if (hadCache) return;
      console.error("[NotaKasir] Gagal memuat data:", err);
      showToast("Data nota/kasir belum bisa dimuat. Mode cepat digunakan.", "err");
      setSaveStatus("", "");
    });
  }
  window.openNotaKasirForm = openNotaKasirForm;

  function selectNotaKasirSistem(value) {
    if (!notaKasirFormState) {
      notaKasirFormState = defaultNotaKasirRecordClient(view.notaKasirCabangId);
    }
    notaKasirFormState.sistemNotaKasir = value;
    if (value === "nota_manual_ncr") {
      notaKasirFormState.metodeBiayaAplikasi = "gratis_tanpa_biaya_admin";
    } else if (!notaKasirFormState.metodeBiayaAplikasi) {
      notaKasirFormState.metodeBiayaAplikasi = "biaya_langsung_per_transaksi";
    }
    renderNotaKasirForm();
  }
  window.selectNotaKasirSistem = selectNotaKasirSistem;

  function selectNotaKasirMetode(value) {
    if (!notaKasirFormState) {
      notaKasirFormState = defaultNotaKasirRecordClient(view.notaKasirCabangId);
    }
    notaKasirFormState.metodeBiayaAplikasi = value;
    renderNotaKasirForm();
  }
  window.selectNotaKasirMetode = selectNotaKasirMetode;

  function renderNotaKasirForm() {
    if (!notaKasirFormState) return;

    var body = document.getElementById("notaKasirBody");
    body.innerHTML = "";

    if (notaKasirFormState.sistemNotaKasir === "aplikasi_kasir_thermal") {
      body.innerHTML = "<div class=\"group-divider\">Metode biaya aplikasi</div>" +
        "<div class=\"pill-group\" id=\"notaKasirMetodePills\">" +
          "<div class=\"pill brass\" data-val=\"biaya_langsung_per_transaksi\" onclick=\"selectNotaKasirMetode('biaya_langsung_per_transaksi')\">Biaya langsung per transaksi</div>" +
          "<div class=\"pill volt\" data-val=\"biaya_bulanan_dibagi_transaksi\" onclick=\"selectNotaKasirMetode('biaya_bulanan_dibagi_transaksi')\">Biaya bulanan dibagi transaksi</div>" +
          "<div class=\"pill sage\" data-val=\"gratis_tanpa_biaya_admin\" onclick=\"selectNotaKasirMetode('gratis_tanpa_biaya_admin')\">Gratis tanpa biaya admin</div>" +
        "</div>" +
        "<div class=\"field\" id=\"notaBiayaPerTransaksiField\">" +
          "<label for=\"notaBiayaPerTransaksi\">Biaya per transaksi (Rp)</label>" +
          "<input type=\"text\" inputmode=\"numeric\" pattern=\"[0-9]*\" id=\"notaBiayaPerTransaksi\" placeholder=\"Contoh: 155\">" +
        "</div>" +
        "<div class=\"field\" id=\"notaBiayaBulananWrap\">" +
          "<label for=\"notaBiayaBulananAplikasi\">Biaya bulanan aplikasi (Rp)</label>" +
          "<input type=\"text\" inputmode=\"numeric\" pattern=\"[0-9]*\" id=\"notaBiayaBulananAplikasi\" placeholder=\"Contoh: 0\">" +
        "</div>" +
        "<div class=\"field\" id=\"notaEstimasiTransaksiWrap\">" +
          "<label for=\"notaEstimasiTransaksiPerBulan\">Estimasi transaksi per bulan</label>" +
          "<input type=\"number\" inputmode=\"decimal\" min=\"0\" step=\"1\" id=\"notaEstimasiTransaksiPerBulan\" placeholder=\"Contoh: 300\">" +
        "</div>" +
        "<div class=\"group-divider\">Nota thermal</div>" +
        "<div class=\"field\">" +
          "<label for=\"notaHargaPerRoll\">Harga per roll (Rp)</label>" +
          "<input type=\"text\" inputmode=\"numeric\" pattern=\"[0-9]*\" id=\"notaHargaPerRoll\" placeholder=\"Contoh: 1500\">" +
        "</div>" +
        "<div class=\"field\">" +
          "<label for=\"notaTransaksiPerRoll\">Transaksi per roll</label>" +
          "<input type=\"number\" inputmode=\"decimal\" min=\"0\" step=\"1\" id=\"notaTransaksiPerRoll\" placeholder=\"Contoh: 30\">" +
        "</div>";
    } else {
      body.innerHTML = "<div class=\"group-divider\">Nota manual NCR</div>" +
        "<div class=\"field\">" +
          "<label for=\"notaHargaSatuanAwalNota\">Harga satuan awal nota (Rp)</label>" +
          "<input type=\"text\" inputmode=\"numeric\" pattern=\"[0-9]*\" id=\"notaHargaSatuanAwalNota\" placeholder=\"Contoh: 30000\">" +
        "</div>" +
        "<div class=\"field\">" +
          "<label for=\"notaJumlahLembarNota\">Jumlah lembar nota</label>" +
          "<input type=\"number\" inputmode=\"decimal\" min=\"0\" step=\"1\" id=\"notaJumlahLembarNota\" placeholder=\"Contoh: 150\">" +
        "</div>" +
        "<div class=\"field\">" +
          "<label for=\"notaNotaPerTransaksi\">Nota per transaksi</label>" +
          "<input type=\"number\" inputmode=\"decimal\" min=\"0\" step=\"1\" id=\"notaNotaPerTransaksi\" placeholder=\"Contoh: 3\">" +
        "</div>";
    }

    syncNotaKasirPillStates();

    var metodeAplikasiAktif = notaKasirFormState.metodeBiayaAplikasi;
    var biayaPerTransaksiField = document.getElementById("notaBiayaPerTransaksiField");
    var biayaBulananWrap = document.getElementById("notaBiayaBulananWrap");
    var estimasiTransaksiWrap = document.getElementById("notaEstimasiTransaksiWrap");
    if (biayaPerTransaksiField) biayaPerTransaksiField.style.display = (metodeAplikasiAktif === "biaya_bulanan_dibagi_transaksi") ? "none" : "";
    if (biayaBulananWrap) biayaBulananWrap.style.display = (metodeAplikasiAktif === "biaya_langsung_per_transaksi") ? "none" : "";
    if (estimasiTransaksiWrap) estimasiTransaksiWrap.style.display = (metodeAplikasiAktif === "biaya_langsung_per_transaksi") ? "none" : "";

    var biayaPerTransaksiInput = document.getElementById("notaBiayaPerTransaksi");
    if (biayaPerTransaksiInput) {
      biayaPerTransaksiInput.value = notaKasirFormState.biayaPerTransaksi ? Number(notaKasirFormState.biayaPerTransaksi).toLocaleString("id-ID") : "";
      biayaPerTransaksiInput.addEventListener("input", function (e) {
        var digitsOnly = e.target.value.replace(/[^0-9]/g, "");
        var numVal = Number(digitsOnly) || 0;
        notaKasirFormState.biayaPerTransaksi = numVal;
        e.target.value = numVal > 0 ? numVal.toLocaleString("id-ID") : "";
        renderNotaKasirPreview();
      });
    }

    var biayaBulananInput = document.getElementById("notaBiayaBulananAplikasi");
    if (biayaBulananInput) {
      biayaBulananInput.value = notaKasirFormState.biayaBulananAplikasi ? Number(notaKasirFormState.biayaBulananAplikasi).toLocaleString("id-ID") : "";
      biayaBulananInput.addEventListener("input", function (e) {
        var digitsOnly = e.target.value.replace(/[^0-9]/g, "");
        var numVal = Number(digitsOnly) || 0;
        notaKasirFormState.biayaBulananAplikasi = numVal;
        e.target.value = numVal > 0 ? numVal.toLocaleString("id-ID") : "";
        renderNotaKasirPreview();
      });
    }

    var estimasiTransaksiInput = document.getElementById("notaEstimasiTransaksiPerBulan");
    if (estimasiTransaksiInput) {
      estimasiTransaksiInput.value = notaKasirFormState.estimasiTransaksiPerBulan || "";
      estimasiTransaksiInput.addEventListener("input", function (e) {
        notaKasirFormState.estimasiTransaksiPerBulan = Number(e.target.value) || 0;
        renderNotaKasirPreview();
      });
    }

    var hargaPerRollInput = document.getElementById("notaHargaPerRoll");
    if (hargaPerRollInput) {
      hargaPerRollInput.value = notaKasirFormState.hargaPerRoll ? Number(notaKasirFormState.hargaPerRoll).toLocaleString("id-ID") : "";
      hargaPerRollInput.addEventListener("input", function (e) {
        var digitsOnly = e.target.value.replace(/[^0-9]/g, "");
        var numVal = Number(digitsOnly) || 0;
        notaKasirFormState.hargaPerRoll = numVal;
        e.target.value = numVal > 0 ? numVal.toLocaleString("id-ID") : "";
        renderNotaKasirPreview();
      });
    }

    var transaksiPerRollInput = document.getElementById("notaTransaksiPerRoll");
    if (transaksiPerRollInput) {
      transaksiPerRollInput.value = notaKasirFormState.transaksiPerRoll || "";
      transaksiPerRollInput.addEventListener("input", function (e) {
        notaKasirFormState.transaksiPerRoll = Number(e.target.value) || 0;
        renderNotaKasirPreview();
      });
    }

    var hargaSatuanAwalNotaInput = document.getElementById("notaHargaSatuanAwalNota");
    if (hargaSatuanAwalNotaInput) {
      hargaSatuanAwalNotaInput.value = notaKasirFormState.hargaSatuanAwalNota ? Number(notaKasirFormState.hargaSatuanAwalNota).toLocaleString("id-ID") : "";
      hargaSatuanAwalNotaInput.addEventListener("input", function (e) {
        var digitsOnly = e.target.value.replace(/[^0-9]/g, "");
        var numVal = Number(digitsOnly) || 0;
        notaKasirFormState.hargaSatuanAwalNota = numVal;
        e.target.value = numVal > 0 ? numVal.toLocaleString("id-ID") : "";
        renderNotaKasirPreview();
      });
    }

    var jumlahLembarNotaInput = document.getElementById("notaJumlahLembarNota");
    if (jumlahLembarNotaInput) {
      jumlahLembarNotaInput.value = notaKasirFormState.jumlahLembarNota || "";
      jumlahLembarNotaInput.addEventListener("input", function (e) {
        notaKasirFormState.jumlahLembarNota = Number(e.target.value) || 0;
        renderNotaKasirPreview();
      });
    }

    var notaPerTransaksiInput = document.getElementById("notaNotaPerTransaksi");
    if (notaPerTransaksiInput) {
      notaPerTransaksiInput.value = notaKasirFormState.notaPerTransaksi || "";
      notaPerTransaksiInput.addEventListener("input", function (e) {
        notaKasirFormState.notaPerTransaksi = Number(e.target.value) || 0;
        renderNotaKasirPreview();
      });
    }

    renderNotaKasirPreview();
  }

  function renderNotaKasirPreview() {
    if (!notaKasirFormState) return;
    var summary = computeNotaKasirPreview(notaKasirFormState);
    document.getElementById("notaAplikasiPerTransaksi").textContent = money0(summary.biayaAplikasiPerLoad);
    document.getElementById("notaBiayaPerLoad").textContent = money0(summary.biayaNotaPerLoad);
    document.getElementById("notaTotalPerLoad").textContent = money0(summary.totalBiayaNotaKasirPerLoad);
    var warningEl = document.getElementById("notaKasirWarning");
    if (summary.warning) {
      warningEl.textContent = summary.warning;
      warningEl.style.display = "block";
    } else {
      warningEl.style.display = "none";
    }
  }

  function computeNotaKasirPreview(record) {
    var sistem = record.sistemNotaKasir || "aplikasi_kasir_thermal";
    var metode = record.metodeBiayaAplikasi || "biaya_langsung_per_transaksi";
    var biayaAplikasiPerLoad = 0;
    var biayaNotaPerLoad = 0;
    var warning = "";
    var statusValid = true;
    var hargaNotaPerLembar = 0;

    if (sistem === "aplikasi_kasir_thermal") {
      if (metode === "biaya_langsung_per_transaksi") {
        biayaAplikasiPerLoad = Number(record.biayaPerTransaksi) || 0;
      } else if (metode === "biaya_bulanan_dibagi_transaksi") {
        var biayaBulanan = Number(record.biayaBulananAplikasi) || 0;
        var trxBulanan = Number(record.estimasiTransaksiPerBulan) || 0;
        if (trxBulanan > 0) {
          biayaAplikasiPerLoad = round2(biayaBulanan / trxBulanan);
        } else {
          biayaAplikasiPerLoad = 0;
          warning = "Estimasi transaksi bulanan harus diisi lebih dari 0 untuk menghitung biaya aplikasi.";
          statusValid = false;
        }
      } else {
        biayaAplikasiPerLoad = 0;
      }

      var hargaRoll = Number(record.hargaPerRoll) || 0;
      var transaksiRoll = Number(record.transaksiPerRoll) || 0;
      if (transaksiRoll > 0) {
        biayaNotaPerLoad = round2(hargaRoll / transaksiRoll);
      } else {
        biayaNotaPerLoad = 0;
        if (!warning) {
          warning = "Transaksi per roll harus diisi lebih dari 0 untuk menghitung biaya nota thermal.";
        }
        statusValid = false;
      }
    } else {
      var hargaAwal = Number(record.hargaSatuanAwalNota) || 0;
      var jumlahLembar = Number(record.jumlahLembarNota) || 0;
      var notaPerTransaksi = Number(record.notaPerTransaksi) || 0;

      if (jumlahLembar > 0) {
        hargaNotaPerLembar = round2(hargaAwal / jumlahLembar);
      } else {
        hargaNotaPerLembar = 0;
        warning = "Jumlah lembar nota harus diisi lebih dari 0 untuk menghitung harga per lembar.";
        statusValid = false;
      }
      biayaNotaPerLoad = round2(hargaNotaPerLembar * notaPerTransaksi);
      biayaAplikasiPerLoad = 0;
      if (notaPerTransaksi <= 0) {
        if (!warning) {
          warning = "Nota per transaksi harus diisi lebih dari 0 untuk menghitung biaya nota.";
        }
        statusValid = false;
      }
    }

    return {
      biayaAplikasiPerLoad: round2(biayaAplikasiPerLoad),
      biayaNotaPerLoad: round2(biayaNotaPerLoad),
      totalBiayaNotaKasirPerLoad: round2(biayaAplikasiPerLoad + biayaNotaPerLoad),
      warning: warning,
      statusValid: statusValid
    };
  }

  function saveNotaKasirForm() {
    if (!view.notaKasirCabangId || !notaKasirFormState) return;
    var saveBtn = document.getElementById("notaKasirSaveBtn");
    if (saveBtn) {
      saveBtn.disabled = true;
      saveBtn.textContent = "Menyimpan...";
    }
    setSaveStatus("Menyimpan...", "busy");

    // UX timeout: jangan biarkan tombol tergantung selamanya
    var saveTimeout = window.setTimeout(function () {
      var btn = document.getElementById("notaKasirSaveBtn");
      if (btn) {
        btn.disabled = false;
        btn.textContent = "Simpan perubahan";
      }
      setSaveStatus("Lambat", "err");
      showToast("Proses simpan lambat. Coba klik simpan lagi jika belum tersimpan.", "err");
    }, 10000);

    google.script.run
      .withSuccessHandler(function (res) {
        window.clearTimeout(saveTimeout);
        if (saveBtn) {
          saveBtn.disabled = false;
          saveBtn.textContent = "Simpan perubahan";
        }
        if (!res || !res.ok) {
          handleBackendError(res, "menyimpan data biaya nota kasir");
          return;
        }
        invalidateServerReadCache_("getBiayaNotaKasir", view.notaKasirCabangId);
        notaKasirFormState = res.data.record || notaKasirFormState;
        // Hanya update ringkasan/pratinjau agar input tidak ter-reset
        renderNotaKasirPreview();
        showToast("Data biaya nota/ kasir tersimpan.", "ok");
        setSaveStatus("Tersimpan", "ok");
        showScreen("masterBiaya");
        refreshBiayaPickCabangList();
      })
      .withFailureHandler(function (err) {
        window.clearTimeout(saveTimeout);
        if (saveBtn) {
          saveBtn.disabled = false;
          saveBtn.textContent = "Simpan perubahan";
        }
        handleBackendError({ error: err && err.message ? err.message : String(err), stage: "client:saveBiayaNotaKasir" }, "menyimpan data biaya nota kasir");
      })
      .saveBiayaNotaKasir(view.notaKasirCabangId, notaKasirFormState);
  }
  window.saveNotaKasirForm = saveNotaKasirForm;

</script>
