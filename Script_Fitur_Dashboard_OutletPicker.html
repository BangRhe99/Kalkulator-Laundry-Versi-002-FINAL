<!--
===============================================================================
FILE: Script_Fitur_Dashboard_OutletPicker.html
PROJECT: Kalkulator Laundry Versi 002
ISI: Outlet picker/filter (dashboardSelectedOutletId + pill kembar lintas layar)

FUNGSI:
Pusat pemilihan "outlet aktif" yang dipakai bareng oleh SEMUA layar
"satu-outlet, satu-layar" (Dashboard, Profil Outlet, Master Biaya, Struktur
Biaya HPP, Harga Layanan, Biaya Tetap Outlet) - var dashboardSelectedOutletId
di file inilah SUMBER KEBENARAN TUNGGAL "outlet mana yang sedang dilihat",
dibaca lintas file lain lewat scope global yang sama (lihat catatan di
bawah). Kalau mau ubah cara kerja pill outlet / modal picker, cari di sini.

DIPECAH dari Script_Fitur_Dashboard.html (2026-07-12) supaya file itu tidak
terus membengkak - lihat riwayat pemecahan lengkap di Index.html & panduan
pemecahan file besar di KONTEKS_PROYEK.md. Fungsi & var di file ini TIDAK
berubah sama sekali saat dipindah, murni potong-tempel.

PENTING -- catat sebelum edit:
Semua file Script_*.html berbagi SATU scope global yang sama (Apps Script
include() cuma menggabungkan teks mentah jadi satu <script> demi <script>
di halaman yang sama -- bukan module system). Karena itu file ini SENGAJA
TIDAK dibungkus (function(){...})() -- kalau kamu bungkus lagi, fungsi di
file ini jadi tidak kelihatan dari file lain dan app akan rusak.
Urutan include TIDAK masalah untuk deklarasi function/var (hoisting),
TAPI Script_Boot_Main.html WAJIB tetap paling terakhir karena dia yang
menjalankan bootApp().

DIPAKAI OLEH FILE LAIN (contoh, bukan daftar lengkap):
  - Script_Fitur_Dashboard.html   : refreshDashboard/fetchDashboardFullSummary_
    baca dashboardSelectedOutletId & getStoredOutletId_ dari file ini.
  - Script_Fitur_Dashboard_Kartu.html : openBepMix/saveBepMix baca
    dashboardSelectedOutletId dari file ini.
  - Script_Fitur_Cabang.html, Script_Fitur_MasterBiaya.html,
    Script_Fitur_StrukturHPP.html, Script_Fitur_HargaLayanan.html,
    Script_Fitur_BiayaTetapOutlet.html : masing-masing punya pill sendiri
    yang didaftarkan di OUTLET_FILTER_PILL_IDS_ di bawah, dan memanggil
    ensureDashboardOutletSelection_()/updateOutletFilterPillText_() dari
    file ini saat render.
===============================================================================
-->
<script>
"use strict";
  /**
   * =========================================================================
   * OUTLET PICKER (filter Dashboard per outlet)
   * =========================================================================
   */
  var DASHBOARD_OUTLET_STORAGE_KEY = "dashboardSelectedOutletId";
  var dashboardSelectedOutletId = null;

  function getStoredOutletId_() {
    try {
      return window.localStorage.getItem(DASHBOARD_OUTLET_STORAGE_KEY);
    } catch (e) {
      return null;
    }
  }

  function setStoredOutletId_(id) {
    try {
      window.localStorage.setItem(DASHBOARD_OUTLET_STORAGE_KEY, id);
    } catch (e) {}
  }

  // Tiap layar "satu-outlet, satu-layar" (Dashboard, Profil Outlet, Master
  // Biaya, Struktur Biaya HPP) punya pill kembar sendiri (nama + badge
  // kategori + jumlah outlet), semuanya menunjuk outlet yang SAMA
  // (dashboardSelectedOutletId). Didaftarkan di satu tempat spy nambah pill
  // baru cukup 1 baris, bukan menyalin ulang blok yang sama.
  var OUTLET_FILTER_PILL_IDS_ = ["dashboardOutletFilter", "profilOutletFilter", "masterBiayaOutletFilter", "strukturHPPOutletFilter", "hargaLayananOutletFilter", "biayaTetapOutletFilter"];

  function updateOutletFilterPillText_() {
    var rows = cabangListCache || [];
    var current = rows.find(function (c) { return c.id === dashboardSelectedOutletId; });
    var nameText = current ? (current.namaLaundry || "Outlet tanpa nama") : "Pilih outlet";
    var katLabel = (current && current.kategoriLayanan && typeof KATEGORI_LABEL !== "undefined")
      ? (KATEGORI_LABEL[current.kategoriLayanan] || "") : "";
    var countText = rows.length > 1 ? rows.length + " outlet aktif" : "";

    OUTLET_FILTER_PILL_IDS_.forEach(function (pillId) {
      var pillEl = document.getElementById(pillId);
      if (!pillEl) return; // elemen ini hanya ada di layarnya sendiri

      var nameEl = pillEl.querySelector(".outlet-filter-name");
      if (nameEl) nameEl.textContent = nameText;

      var katEl = document.getElementById(pillId.replace(/Filter$/, "Kategori"));
      if (katEl) katEl.textContent = katLabel;

      pillEl.classList.toggle("single-outlet", rows.length <= 1);

      var countEl = document.getElementById(pillId.replace(/Filter$/, "CountLabel"));
      if (countEl) countEl.textContent = countText;
    });
  }

  function ensureDashboardOutletSelection_() {
    var rows = cabangListCache || [];
    if (!rows.length) {
      dashboardSelectedOutletId = null;
      updateOutletFilterPillText_();
      return;
    }

    var stored = getStoredOutletId_();
    var storedExists = rows.some(function (c) { return c.id === stored; });

    if (storedExists) {
      dashboardSelectedOutletId = stored;
    } else {
      dashboardSelectedOutletId = rows[0].id;
      setStoredOutletId_(dashboardSelectedOutletId);
    }

    updateOutletFilterPillText_();
  }

  function renderOutletPickerList_() {
    var listEl = document.getElementById("outletPickerList");
    if (!listEl) return;

    var rows = cabangListCache || [];

    if (!rows.length) {
      listEl.innerHTML = "<div class=\"empty-hint\">Belum ada outlet. Tambahkan di menu Profil Outlet.</div>";
      return;
    }

    listEl.innerHTML = rows.map(function (item) {
      var isActive = item.id === dashboardSelectedOutletId;
      return (
        "<div class=\"outlet-picker-item" + (isActive ? " active" : "") + "\" data-outlet-id=\"" + escapeHtml(item.id) + "\">" +
          "<span>" + escapeHtml(item.namaLaundry || "Outlet tanpa nama") + "</span>" +
          "<svg class=\"check-icon\" viewBox=\"0 0 24 24\" width=\"18\" height=\"18\"><path d=\"M5 13l4 4L19 7\" stroke=\"currentColor\" stroke-width=\"2.4\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg>" +
        "</div>"
      );
    }).join("");

    listEl.querySelectorAll("[data-outlet-id]").forEach(function (el) {
      el.addEventListener("click", function () {
        var id = el.getAttribute("data-outlet-id");
        var changed = id !== dashboardSelectedOutletId;
        dashboardSelectedOutletId = id;
        setStoredOutletId_(id);
        updateOutletFilterPillText_();
        renderOutletPickerList_();
        closeOutletPicker();
        if (changed) refreshDashboardFast();
        // Kalau sedang di layar Profil Outlet (desktop), render ulang kartunya
        // ke outlet yang baru dipilih (fungsi ada di Script_Fitur_Cabang.html).
        if (typeof renderProfilOutletDesktop_ === "function") renderProfilOutletDesktop_();
        // Sama utk layar Master Biaya (desktop) - fungsi ada di
        // Script_Fitur_MasterBiaya.html.
        if (typeof renderMasterBiayaDesktop_ === "function") renderMasterBiayaDesktop_();
        // Sama utk layar Struktur Biaya HPP (desktop) - fungsi ada di
        // Script_Fitur_StrukturHPP.html.
        if (typeof renderStrukturHPPDesktop_ === "function") renderStrukturHPPDesktop_();
        // Sama utk layar Harga Layanan & Biaya Tetap Outlet (desktop) -
        // fungsi ada di Script_Fitur_HargaLayanan.html &
        // Script_Fitur_BiayaTetapOutlet.html.
        if (typeof renderHargaLayananDesktop_ === "function") renderHargaLayananDesktop_();
        if (typeof renderBiayaTetapDesktop_ === "function") renderBiayaTetapDesktop_();
      });
    });
  }

  window.openOutletPicker = function () {
    var rows = cabangListCache || [];
    if (rows.length <= 1) return;
    renderOutletPickerList_();
    document.getElementById("outletPickerOverlay").classList.add("show");
  };

  window.closeOutletPicker = function () {
    document.getElementById("outletPickerOverlay").classList.remove("show");
  };
</script>
