<!--
===============================================================================
FILE: Script_Fitur_StrukturHPP.html
PROJECT: Kalkulator Laundry Versi 002
ISI: Fitur Struktur Biaya HPP

FUNGSI:
List outlet + render rincian komponen HPP per layanan (sumber data agregat dari semua Modul_Biaya*.gs).

PENTING -- catat sebelum edit:
Semua file Script_*.html berbagi SATU scope global yang sama (Apps Script
include() cuma menggabungkan teks mentah jadi satu <script> demi <script>
di halaman yang sama -- bukan module system). Karena itu file ini SENGAJA
TIDAK dibungkus (function(){...})() -- kalau kamu bungkus lagi, fungsi di
file ini jadi tidak kelihatan dari file lain dan app akan rusak.
Urutan include TIDAK masalah untuk deklarasi function/var (hoisting),
TAPI Script_Boot_Main.html WAJIB tetap paling terakhir karena dia yang
menjalankan bootApp().
===============================================================================
-->
<script>
"use strict";
  function normalizeOutletRow_(item) {
    if (!item) return {};
    return item.cabang || item.outlet || item.profil || item;
  }

  function getOutletId_(cabang) {
    cabang = cabang || {};
    return String(
      cabang.id ||
      cabang.cabangId ||
      cabang.outletId ||
      cabang.idCabang ||
      ""
    ).trim();
  }

  function getOutletNama_(cabang) {
    cabang = cabang || {};
    var profil = cabang.profil || {};
    return (
      profil.namaLaundry ||
      cabang.namaLaundry ||
      cabang.nama ||
      cabang.namaCabang ||
      "Outlet tanpa nama"
    );
  }

  window.openStrukturHPPOutletList = function () {
    showScreen("strukturHPPList");

    var listEl = document.getElementById("strukturHPPOutletList");
    var countEl = document.getElementById("strukturHPPOutletCount");

    if (!listEl) return;

    listEl.innerHTML =
      '<div class="hpp-loading">Memuat daftar outlet...</div>';

    function renderFromCache() {
      var cabangs = Array.isArray(cabangListCache) ? cabangListCache : [];

      if (countEl) {
        countEl.textContent = cabangs.length + " outlet";
      }

      if (!cabangs.length) {
        listEl.innerHTML =
          '<div class="empty-state">' +
            '<div class="icon">&#127981;</div>' +
            '<p>Belum ada outlet. Silakan buat Profil Outlet terlebih dahulu.</p>' +
          '</div>';
        renderStrukturHPPDesktop_();
        return;
      }

      listEl.innerHTML = cabangs.map(function (item) {
        var cabang = normalizeOutletRow_(item);
        var cabangId = getOutletId_(cabang);
        var namaLaundry = getOutletNama_(cabang);

        return (
          '<div class="menu-card tone-volt" onclick="openStrukturHPPDetail(\'' + escapeJsAttr(cabangId) + '\')">' +
            '<div class="menu-icon">&#128202;</div>' +
            '<div class="menu-body">' +
              '<div class="menu-title">' + escapeHtml(namaLaundry) + '</div>' +
              '<div class="menu-desc">Lihat rincian HPP cuci, kering, dan cuci kering.</div>' +
            '</div>' +
            '<div class="menu-arrow">&#8594;</div>' +
          '</div>'
        );
      }).join("");

      // Panel desktop (satu outlet terpilih) - dirender terpisah dari daftar
      // HP di atas, lihat renderStrukturHPPDesktop_ di bawah.
      renderStrukturHPPDesktop_();
    }

    if (Array.isArray(cabangListCache) && cabangListCache.length) {
      renderFromCache();
      return;
    }

    // SWR: daftar outlet (listCabang, cache bersama lintas fitur) tampil
    // INSTAN lalu refresh. Detail HPP (getStrukturBiayaHPP) SENGAJA tidak
    // di-cache karena angkanya agregat dari semua biaya - selalu ambil fresh
    // supaya tidak pernah menampilkan HPP basi.
    cachedServerRead_("listCabang", undefined, function (res, fromCache) {
      if (view.screen !== "strukturHPPList") return;
      if (!res || !res.ok) {
        if (!fromCache) {
          handleBackendError(res, "memuat daftar outlet Struktur Biaya HPP");
          listEl.innerHTML =
            '<div class="empty-state">' +
              '<div class="icon">&#9888;</div>' +
              '<p>Gagal memuat daftar outlet.</p>' +
            '</div>';
        }
        return;
      }
      cabangListCache = Array.isArray(res.data) ? res.data : [];
      renderFromCache();
    }, function (err, hadCache) {
      if (hadCache) return;
      handleBackendError(
        {
          error: err && err.message ? err.message : String(err),
          stage: "client:strukturHPP:listCabang"
        },
        "memuat daftar outlet Struktur Biaya HPP"
      );

      listEl.innerHTML =
        '<div class="empty-state">' +
          '<div class="icon">&#9888;</div>' +
          '<p>Gagal memuat daftar outlet.</p>' +
        '</div>';
    });
  };

  /**
   * =========================================================================
   * STRUKTUR BIAYA HPP - LAYAR DESKTOP (#screenStrukturHPPList, >=1100px)
   * -------------------------------------------------------------------------
   * Panel HPP utk outlet yang sedang dipilih (dashboardSelectedOutletId,
   * dipakai bareng Dashboard/Profil Outlet/Master Biaya). Kartu layanan
   * dibangun via buildStrukturHPPDesktopHtml_ (TIDAK reuse markup Dashboard
   * lagi) - SELALU terbuka, tanpa tombol panah (Progressive Disclosure
   * dimatikan khusus di panel ini sesuai revisi tampilan, [2026-07-13]).
   * Kartu HPP di Dashboard (.hpp-mini-card via Script_Fitur_Dashboard_Kartu)
   * TIDAK tersentuh - tetap collapsible spt semula.
   * [2026-07-13] Sebelumnya getStrukturBiayaHPP() SENGAJA tidak di-cache
   * supaya angkanya selalu segar - atas konfirmasi user, sekarang ikut pakai
   * cachedServerRead_ (SWR) spt Master Biaya/Harga Layanan/Biaya Tetap demi
   * kecepatan pindah layar; data tetap direvalidasi di background tiap buka
   * (lihat cachedServerRead_ di Script_Shared_Util.html).
   * =========================================================================
   */
  function renderStrukturHPPDesktop_() {
    var host = document.getElementById("strukturHPPDesktopContent");
    if (!host) return;

    var rows = cabangListCache || [];
    if (typeof ensureDashboardOutletSelection_ === "function") ensureDashboardOutletSelection_();
    if (typeof updateOutletFilterPillText_ === "function") updateOutletFilterPillText_();

    var selId = (typeof dashboardSelectedOutletId !== "undefined") ? dashboardSelectedOutletId : null;
    var current = rows.find(function (c) { return getOutletId_(normalizeOutletRow_(c)) === selId; }) || rows[0] || null;

    if (!current) {
      host.innerHTML = '<div class="dashboard-empty">Belum ada outlet. Tambahkan outlet dulu di menu Profil Outlet.</div>';
      if (typeof window.fitDesktopDashboardToViewport_ === "function") requestAnimationFrame(window.fitDesktopDashboardToViewport_);
      return;
    }

    var cId = getOutletId_(normalizeOutletRow_(current));
    host.innerHTML = '<div class="dashboard-card-summary is-loading">Memuat data...</div>';

    cachedServerRead_("getStrukturBiayaHPP", cId, function (res, fromCache) {
      if (view.screen !== "strukturHPPList") return;
      var stillSelected = ((typeof dashboardSelectedOutletId !== "undefined") ? dashboardSelectedOutletId : null) === cId;
      if (!stillSelected) return;

      if (!res || !res.ok) {
        if (!fromCache) host.innerHTML = '<div class="dashboard-empty">' + escapeHtml(res && res.error ? res.error : "Gagal memuat Struktur Biaya HPP.") + '</div>';
        if (typeof window.fitDesktopDashboardToViewport_ === "function") requestAnimationFrame(window.fitDesktopDashboardToViewport_);
        return;
      }
      host.innerHTML = buildStrukturHPPDesktopHtml_(res.data);
      if (typeof window.fitDesktopDashboardToViewport_ === "function") requestAnimationFrame(window.fitDesktopDashboardToViewport_);
    }, function (err, hadCache) {
      if (hadCache) return;
      host.innerHTML = '<div class="dashboard-empty">' + escapeHtml(err && err.message ? err.message : String(err)) + '</div>';
      if (typeof window.fitDesktopDashboardToViewport_ === "function") requestAnimationFrame(window.fitDesktopDashboardToViewport_);
    });
  }

  // [2026-07-13] Toggle aktif/nonaktif per layanan - SAMA seperti kartu HPP
  // Dashboard (Script_Fitur_Dashboard_Kartu.html), disamakan ke desktop.
  // refresh sendiri (bukan refreshDashboardFast) supaya layar ini yang
  // ter-update, bukan Dashboard.
  window.toggleStrukturHPPLayananDesktop_ = function (cabangId, serviceKey, nextAktif, evt) {
    toggleHPPLayananAktif(cabangId, serviceKey, nextAktif, evt, function () {
      if (typeof invalidateServerReadCache_ === "function") invalidateServerReadCache_("getStrukturBiayaHPP", cabangId);
      renderStrukturHPPDesktop_();
    });
  };

  function buildStrukturHPPToggleHtml_(cabangId, toggleInfo) {
    if (!toggleInfo) return '';
    var toggleFn = toggleInfo.isCustom ? 'toggleCustomLayananAktif_' : 'toggleStrukturHPPLayananDesktop_';
    var deleteHtml = toggleInfo.isCustom
      ? '<button type="button" class="hpp-custom-delete-btn" onclick="openConfirmDeleteCustomLayanan_(\'' + escapeJsAttr(cabangId) + '\', \'' + escapeJsAttr(toggleInfo.key) + '\', \'' + escapeJsAttr(toggleInfo.title) + '\', event)">Hapus</button>'
      : '';
    return '<div class="hpp-bedcover-toggle-row">' +
      '<span>Layanan aktif</span>' +
      '<span>' +
        '<button type="button" class="hpp-bedcover-toggle-btn" onclick="' + toggleFn + '(\'' + escapeJsAttr(cabangId) + '\', \'' + escapeJsAttr(toggleInfo.key) + '\', false, event)">Matikan</button>' +
        deleteHtml +
      '</span>' +
    '</div>';
  }

  function buildStrukturHPPOffRowsHtml_(cabangId, serviceToggles) {
    return serviceToggles.filter(function (t) { return t.aktif === false; }).map(function (t) {
      var toggleFn = t.isCustom ? 'toggleCustomLayananAktif_' : 'toggleStrukturHPPLayananDesktop_';
      var deleteHtml = t.isCustom
        ? '<button type="button" class="hpp-custom-delete-btn" onclick="openConfirmDeleteCustomLayanan_(\'' + escapeJsAttr(cabangId) + '\', \'' + escapeJsAttr(t.key) + '\', \'' + escapeJsAttr(t.title) + '\', event)">Hapus</button>'
        : '';
      return '<div class="hpp-bedcover-off-row">' +
        '<span>Layanan ' + escapeHtml((t.title || '').replace(/^HPP /, '')) + ' nonaktif</span>' +
        '<span>' +
          '<button type="button" class="hpp-bedcover-toggle-btn" onclick="' + toggleFn + '(\'' + escapeJsAttr(cabangId) + '\', \'' + escapeJsAttr(t.key) + '\', true, event)">Aktifkan</button>' +
          deleteHtml +
        '</span>' +
      '</div>';
    }).join('');
  }

  /* =======================================================================
   * LAYANAN CUSTOM [2026-07-22] -- tambah/hapus/toggle layanan HPP custom
   * (Firestore, Modul_StrukturBiayaHPP.gs). Toggle aktif/nonaktif layanan
   * custom TIDAK lewat toggleHPPLayananAktif (itu khusus key bawaan,
   * ditolak backend utk key custom) - pakai jalur sendiri di bawah.
   * ======================================================================= */
  var customLayananModalCabangId_ = null;
  var customLayananModalPool_ = [];

  function refreshCustomLayananView_(cabangId) {
    if (typeof invalidateServerReadCache_ === "function") {
      invalidateServerReadCache_("getStrukturBiayaHPP", cabangId);
      invalidateServerReadCache_("getHargaLayanan", cabangId);
    }
    if (view.screen === "strukturHPPDetail") {
      openStrukturHPPDetail(cabangId);
    } else {
      renderStrukturHPPDesktop_();
    }
  }

  window.toggleCustomLayananAktif_ = function (cabangId, key, nextAktif, evt) {
    if (evt) evt.stopPropagation();
    if (!cabangId || !key) return;
    callServer_("setCustomLayananHPPAktif", [cabangId, key, nextAktif], function (res) {
      if (!res || !res.ok) {
        showToast((res && res.error) || "Gagal mengubah status layanan.", "err");
        return;
      }
      refreshCustomLayananView_(cabangId);
    }, function (err) {
      showToast(err && err.message ? err.message : "Gagal mengubah status layanan.", "err");
    });
  };

  window.openConfirmDeleteCustomLayanan_ = function (cabangId, key, title, evt) {
    if (evt) evt.stopPropagation();
    document.getElementById("confirmTitle").textContent = "Hapus layanan custom ini?";
    document.getElementById("confirmText").textContent =
      "Layanan \"" + title + "\" akan dihapus permanen, termasuk harga jualnya di Harga Layanan. Tidak bisa dikembalikan.";
    document.getElementById("confirmOverlay").classList.add("show");

    var btn = document.getElementById("confirmDeleteBtn");
    btn.onclick = function () { confirmDeleteCustomLayanan_(cabangId, key); };
  };

  function confirmDeleteCustomLayanan_(cabangId, key) {
    var btn = document.getElementById("confirmDeleteBtn");
    btn.disabled = true;
    btn.textContent = "Menghapus...";

    callServer_("deleteCustomLayananHPP", [cabangId, key], function (res) {
      btn.disabled = false;
      btn.textContent = "Hapus";
      closeConfirm();
      if (!res || !res.ok) {
        showToast((res && res.error) || "Gagal menghapus layanan.", "err");
        return;
      }
      showToast("Layanan custom dihapus.", "ok");
      refreshCustomLayananView_(cabangId);
    }, function (err) {
      btn.disabled = false;
      btn.textContent = "Hapus";
      showToast(err && err.message ? err.message : "Gagal menghapus layanan.", "err");
    });
  }

  function buildCustomLayananAddButtonHtml_(cabangId) {
    return '<div class="hpp-custom-add-row">' +
      '<button type="button" class="hpp-custom-add-btn" onclick="openCustomLayananModal_(\'' + escapeJsAttr(cabangId) + '\')">+ Tambah Layanan Custom</button>' +
    '</div>';
  }

  window.openCustomLayananModal_ = function (cabangId) {
    if (!cabangId) return;
    customLayananModalCabangId_ = cabangId;
    customLayananModalPool_ = [];

    var titleInput = document.getElementById("customLayananTitleInput");
    if (titleInput) titleInput.value = "";
    var errEl = document.getElementById("customLayananError");
    if (errEl) { errEl.textContent = ""; errEl.classList.remove("show"); }

    var listEl = document.getElementById("customLayananComponentList");
    if (listEl) listEl.innerHTML = '<div class="custom-layanan-empty">Memuat komponen...</div>';

    document.getElementById("customLayananOverlay").classList.add("show");

    callServer_("getStrukturHPPComponentPool", [cabangId], function (res) {
      if (!res || !res.ok) {
        if (listEl) listEl.innerHTML = '<div class="custom-layanan-empty">' + escapeHtml((res && res.error) || "Gagal memuat komponen biaya.") + '</div>';
        return;
      }
      var pool = Array.isArray(res.data.pool) ? res.data.pool : [];
      customLayananModalPool_ = pool;
      if (!listEl) return;
      if (!pool.length) {
        listEl.innerHTML = '<div class="custom-layanan-empty">Belum ada data biaya master yang bisa dipakai. Lengkapi Master Biaya dulu.</div>';
        return;
      }
      listEl.innerHTML = pool.map(function (c) {
        return '<div class="custom-layanan-component-row">' +
          '<label>' +
            '<input type="checkbox" value="' + escapeJsAttr(c.key) + '" data-custom-layanan-component>' +
            '<span>' + escapeHtml(c.label) + '</span>' +
          '</label>' +
          '<span class="custom-layanan-component-amount">' + money0(c.amount) + '</span>' +
        '</div>';
      }).join('');
    }, function (err) {
      if (listEl) listEl.innerHTML = '<div class="custom-layanan-empty">' + escapeHtml(err && err.message ? err.message : String(err)) + '</div>';
    });
  };

  window.closeCustomLayananModal = function () {
    document.getElementById("customLayananOverlay").classList.remove("show");
  };

  window.saveCustomLayananHPPFromModal = function () {
    var cabangId = customLayananModalCabangId_;
    var errEl = document.getElementById("customLayananError");
    var showErr = function (msg) {
      if (errEl) { errEl.textContent = msg; errEl.classList.add("show"); }
    };
    if (errEl) { errEl.textContent = ""; errEl.classList.remove("show"); }

    if (!cabangId) { showErr("Outlet tidak valid."); return; }

    var title = (document.getElementById("customLayananTitleInput").value || "").trim();
    if (!title) { showErr("Nama layanan wajib diisi."); return; }

    var checked = document.querySelectorAll('#customLayananComponentList input[data-custom-layanan-component]:checked');
    var componentKeys = Array.prototype.slice.call(checked).map(function (el) { return el.value; });
    if (!componentKeys.length) { showErr("Pilih minimal 1 komponen biaya."); return; }

    var btn = document.getElementById("customLayananSaveBtn");
    btn.disabled = true;
    btn.textContent = "Menyimpan...";

    callServer_("saveCustomLayananHPP", [cabangId, { title: title, componentKeys: componentKeys }], function (res) {
      btn.disabled = false;
      btn.textContent = "Simpan";
      if (!res || !res.ok) { showErr((res && res.error) || "Gagal menyimpan layanan."); return; }
      closeCustomLayananModal();
      showToast("Layanan custom \"" + title + "\" tersimpan.", "ok");
      refreshCustomLayananView_(cabangId);
    }, function (err) {
      btn.disabled = false;
      btn.textContent = "Simpan";
      showErr(err && err.message ? err.message : "Gagal menyimpan layanan.");
    });
  };

  function buildStrukturHPPDesktopHtml_(data) {
    data = data || {};
    var layanan = Array.isArray(data.layanan) ? data.layanan : [];
    var warnings = Array.isArray(data.warnings) ? data.warnings : [];
    var serviceToggles = Array.isArray(data.serviceToggles) ? data.serviceToggles : [];
    var toggleByKey = {};
    serviceToggles.forEach(function (t) { toggleByKey[t.key] = t; });
    var cabangId = (data.cabang && data.cabang.id) || '';

    var offHtml = buildStrukturHPPOffRowsHtml_(cabangId, serviceToggles);
    var addBtnHtml = buildCustomLayananAddButtonHtml_(cabangId);

    if (!layanan.length) {
      return addBtnHtml + '<div class="dashboard-empty">HPP belum siap dihitung untuk outlet ini.</div>' + offHtml;
    }

    var miniHtml = layanan.map(function (svc) {
      var components = Array.isArray(svc.components) ? svc.components : [];
      var rowsHtml = components.map(function (c) {
        return '<div class="hpp-mini-row">' +
          '<span class="hpp-mini-row-label">' + escapeHtml(c.label || '') + '</span>' +
          '<span class="hpp-mini-row-percent">' + String(c.percent || 0) + '%</span>' +
          '<span class="hpp-mini-row-amount">' + money0(c.amount) + '</span>' +
        '</div>';
      }).join('');
      var toggleHtml = buildStrukturHPPToggleHtml_(cabangId, toggleByKey[svc.key]);
      // Kartu langsung terbuka: tanpa tombol panah/onclick, rincian komponen
      // (.hpp-mini-detail) selalu tampil.
      return '<div class="hpp-mini-card is-open">' +
        '<div class="hpp-mini-head">' +
          '<span class="hpp-mini-title">' + escapeHtml(svc.title || '') + '</span>' +
          '<span class="hpp-mini-total">' + money0(svc.total) + '</span>' +
        '</div>' +
        (rowsHtml || toggleHtml ? '<div class="hpp-mini-detail">' + rowsHtml + toggleHtml + '</div>' : '') +
      '</div>';
    }).join('');

    var warningHtml = warnings.length
      ? '<div class="hpp-warning-box"><div class="hpp-warning-title">Catatan Data</div><ul>' +
          warnings.map(function (w) { return '<li>' + escapeHtml(w) + '</li>'; }).join('') +
        '</ul></div>'
      : '';

    // Dibungkus .hpp-desktop-scroll supaya HANYA daftar kartu ini yang bisa
    // discroll kalau lebih panjang dari tinggi panel - header & panel di
    // luar tetap terkunci (lihat Style_Module_HPP.html).
    return '<div class="hpp-desktop-scroll">' + addBtnHtml + '<div class="hpp-mini-list">' + miniHtml + '</div>' + offHtml + warningHtml + '</div>';
  }

  window.openStrukturHPPDetail = function (cabangId) {
    if (!cabangId) {
      showToast("ID outlet tidak valid.", "err");
      return;
    }

    showScreen("strukturHPPDetail");

    var contentEl = document.getElementById("strukturHPPContent");
    if (!contentEl) return;

    contentEl.innerHTML =
      '<div class="hpp-loading">Memuat struktur biaya HPP...</div>';

    setSaveStatus("Menghitung...", "busy");

    callServer_("getStrukturBiayaHPP", [cabangId], function (res) {
        if (!res || !res.ok) {
          handleBackendError(res, "memuat Struktur Biaya HPP");
          contentEl.innerHTML =
            '<div class="empty-state">' +
              '<div class="icon">&#9888;</div>' +
              '<p>' + escapeHtml(res && res.error ? res.error : "Gagal memuat Struktur Biaya HPP.") + '</p>' +
            '</div>';
          setSaveStatus("Gagal", "err");
          return;
        }

        renderStrukturHPP(res.data);
        setSaveStatus("Tersimpan", "ok");
      }, function (err) {
        handleBackendError(
          {
            error: err && err.message ? err.message : String(err),
            stage: "client:strukturHPP:getStrukturBiayaHPP"
          },
          "memuat Struktur Biaya HPP"
        );

        contentEl.innerHTML =
          '<div class="empty-state">' +
            '<div class="icon">&#9888;</div>' +
            '<p>' + escapeHtml(err && err.message ? err.message : String(err)) + '</p>' +
          '</div>';
        setSaveStatus("Gagal", "err");
      });
  };

  // [2026-07-13] Toggle aktif/nonaktif per layanan - refresh layar detail ini
  // sendiri (bukan refreshDashboardFast).
  window.toggleStrukturHPPLayananDetail_ = function (cabangId, serviceKey, nextAktif, evt) {
    toggleHPPLayananAktif(cabangId, serviceKey, nextAktif, evt, function () {
      if (typeof invalidateServerReadCache_ === "function") invalidateServerReadCache_("getStrukturBiayaHPP", cabangId);
      openStrukturHPPDetail(cabangId);
    });
  };

  function renderStrukturHPP(data) {
    var contentEl = document.getElementById("strukturHPPContent");
    if (!contentEl) return;

    data = data || {};

    var cabang = data.cabang || {};
    var cabangId = cabang.id || "";
    var layanan = Array.isArray(data.layanan) ? data.layanan : [];
    var warnings = Array.isArray(data.warnings) ? data.warnings : [];
    var serviceToggles = Array.isArray(data.serviceToggles) ? data.serviceToggles : [];
    var toggleByKey = {};
    serviceToggles.forEach(function (t) { toggleByKey[t.key] = t; });

    var warningHtml = warnings.length
      ? (
        '<div class="hpp-warning-box">' +
          '<div class="hpp-warning-title">Catatan Data</div>' +
          '<ul>' +
            warnings.map(function (w) {
              return '<li>' + escapeHtml(w) + '</li>';
            }).join("") +
          '</ul>' +
        '</div>'
      )
      : "";

    var serviceHtml = layanan.length
      ? layanan.map(function (svc) { return renderStrukturHPPServiceCard(svc, cabangId, toggleByKey[svc.key]); }).join("")
      : (
        '<div class="empty-state">' +
          '<div class="icon">&#128202;</div>' +
          '<p>Belum ada hasil Struktur Biaya HPP untuk outlet ini.</p>' +
        '</div>'
      );

    var offHtml = buildStrukturHPPOffRowsHtml_(cabangId, serviceToggles).replace(
      /toggleStrukturHPPLayananDesktop_/g, "toggleStrukturHPPLayananDetail_"
    );

    contentEl.innerHTML =
      '<div class="summary-hero">' +
        '<div class="summary-eyebrow">SELF SERVICE LAUNDRY</div>' +
        '<div class="summary-title">' + escapeHtml(cabang.namaLaundry || "Outlet") + '</div>' +
        '<div class="summary-meta">' +
          '<span>Satuan: <b>' + escapeHtml(data.satuan || "per load") + '</b></span>' +
          '<span>Sumber air: <b>' + escapeHtml(data.sumberAir || "-") + '</b></span>' +
        '</div>' +
      '</div>' +
      warningHtml +
      buildCustomLayananAddButtonHtml_(cabangId) +
      serviceHtml +
      offHtml;
  }

  function renderStrukturHPPServiceCard(service, cabangId, toggleInfo) {
    service = service || {};
    var components = Array.isArray(service.components) ? service.components : [];
    var toggleFn = (toggleInfo && toggleInfo.isCustom) ? 'toggleCustomLayananAktif_' : 'toggleStrukturHPPLayananDetail_';
    var deleteHtml = (toggleInfo && toggleInfo.isCustom)
      ? '<button type="button" class="hpp-custom-delete-btn" onclick="openConfirmDeleteCustomLayanan_(\'' + escapeJsAttr(cabangId) + '\', \'' + escapeJsAttr(service.key) + '\', \'' + escapeJsAttr(service.title) + '\', event)">Hapus</button>'
      : '';
    var toggleHtml = !toggleInfo ? '' :
      '<div class="hpp-bedcover-toggle-row">' +
        '<span>Layanan aktif</span>' +
        '<span>' +
          '<button type="button" class="hpp-bedcover-toggle-btn" onclick="' + toggleFn + '(\'' + escapeJsAttr(cabangId) + '\', \'' + escapeJsAttr(service.key) + '\', false, event)">Matikan</button>' +
          deleteHtml +
        '</span>' +
      '</div>';

    return (
      '<div class="hpp-service-card">' +
        '<div class="hpp-service-top">' +
          '<div>' +
            '<div class="hpp-service-name">' + escapeHtml(service.title || "HPP") + '</div>' +
            '<div class="hpp-service-unit">' + escapeHtml(service.unitLabel || "per load") + '</div>' +
          '</div>' +
          '<div class="hpp-service-total">' +
            '<div class="hpp-total-label">Total HPP</div>' +
            '<div class="hpp-total-value">' + formatRupiahTanpaDesimal(service.total || 0) + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="hpp-component-list">' +
          components.map(renderStrukturHPPComponentRow).join("") +
        '</div>' +
        toggleHtml +
      '</div>'
    );
  }

  function renderStrukturHPPComponentRow(item) {
    item = item || {};

    var percent = Number(item.percent || 0);
    var safePercent = Math.max(0, Math.min(100, isFinite(percent) ? percent : 0));

    return (
      '<div class="hpp-component-row">' +
        '<div class="hpp-component-line">' +
          '<div class="hpp-component-name">' + escapeHtml(item.label || "Komponen") + '</div>' +
          '<div class="hpp-component-amount">' + formatRupiahTanpaDesimal(item.amount || 0) + '</div>' +
          '<div class="hpp-component-percent">' + safePercent.toFixed(2) + '%</div>' +
        '</div>' +
        '<div class="hpp-progress">' +
          '<div class="hpp-progress-fill" style="width:' + safePercent + '%;"></div>' +
        '</div>' +
        (item.note ? '<div class="hpp-component-note">' + escapeHtml(item.note) + '</div>' : '') +
      '</div>'
    );
  }

  /* Fungsi umum tahap 5 dipindahkan ke file Script_Shared_*.html. */

  function escapeJsAttr(value) {
    return String(value === null || value === undefined ? "" : value)
      .replace(/\\/g, "\\\\")
      .replace(/'/g, "\\'")
      .replace(/"/g, "&quot;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }


  /* =======================================================================
   * BIAYA TETAP OUTLET (FIXED COST)
   * ======================================================================= */

</script>
