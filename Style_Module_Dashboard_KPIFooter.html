<!--
===============================================================================
FILE: Style_Module_Dashboard_KPIFooter.html  (BAGIAN 7 dari 9)
Bagian dari Style_Module_Dashboard (peta lengkap di file utama).
ISI: dashboard-kpi kecil (versi HP), daftar outlet (dashboard-outlet-*),
status pill, footer-bar, dan blok FIX overflow KHUSUS HP
(MOBILE_DASHBOARD_OVERFLOW_FIX).
===============================================================================
-->
<style>
  .dashboard-kpi-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 9px;
  }

  .dashboard-kpi {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 7px 9px;
    min-width: 0;
  }

  .dashboard-kpi strong {
    display: block;
    font-family: var(--font-display);
    font-size: 14px;
    color: var(--text);
    line-height: 1.1;
  }

  .dashboard-kpi span {
    display: block;
    margin-top: 3px;
    font-size: 10.5px;
    color: var(--text-faint);
  }

  .dashboard-outlet-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .dashboard-outlet-row {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    align-items: center;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 8px 9px;
  }

  .dashboard-outlet-name {
    color: var(--text);
    font-weight: 600;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .dashboard-outlet-value {
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 10.5px;
    text-align: right;
    flex-shrink: 0;
  }

  .dashboard-status-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 999px;
    padding: 2px 6px;
    font-family: var(--font-body);
    font-size: 10px;
    font-weight: 700;
    border: 1px solid var(--border);
    color: var(--text-dim);
    margin-left: 4px;
  }

  .dashboard-status-pill.ok {
    border-color: var(--sage-dim);
    color: var(--sage);
  }

  .dashboard-status-pill.warning {
    border-color: var(--brass-dim);
    color: var(--brass);
  }

  .dashboard-status-pill.danger {
    border-color: var(--red-dim);
    color: var(--red);
  }

  .dashboard-outlet-row.is-warning {
    border-color: var(--brass-dim);
  }

  .dashboard-outlet-row.is-danger {
    border-color: var(--red-dim);
  }

  .dashboard-empty,
  .dashboard-more {
    color: var(--text-faint);
    font-size: 12px;
    line-height: 1.45;
  }

  .dashboard-more {
    margin-top: 7px;
    font-family: var(--font-mono);
  }



  .footer-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(180deg, transparent, var(--bg) 30%);
    padding: 16px;
    padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px));
    display: flex;
    justify-content: center;
  }
  .footer-bar .wrap-inner { max-width: 448px; width: 100%; display: flex; gap: 10px; }

  /* === MOBILE_DASHBOARD_OVERFLOW_FIX_START ===
     Root cause yang diperbaiki:
     - Baris dashboard memakai flex dengan value kanan yang panjang.
     - Pill/badge dan teks mono dapat memaksa parent melebar.
     - Card harus min-width:0 agar child boleh mengecil di viewport HP.
  */
  .menu-grid,
  .menu-card,
  .menu-card .menu-body,
  .dashboard-grid,
  .dashboard-card,
  .dashboard-card-summary,
  .dashboard-kpi-row,
  .dashboard-outlet-list,
  .dashboard-outlet-row {
    max-width: 100%;
    min-width: 0;
  }

  .menu-card .menu-body {
    overflow: hidden;
  }

  .menu-card .menu-title,
  .menu-card .menu-desc,
  .dashboard-empty,
  .dashboard-more {
    max-width: 100%;
    overflow-wrap: anywhere;
    word-break: normal;
  }

  .dashboard-card-summary {
    width: 100%;
  }

  .dashboard-kpi {
    min-width: 0;
    max-width: 100%;
  }

  .dashboard-outlet-row {
    width: 100%;
  }

  .dashboard-outlet-name {
    flex: 1 1 auto;
    min-width: 0;
    max-width: 100%;
  }

  .dashboard-outlet-value {
    min-width: 0;
    max-width: 100%;
    overflow-wrap: anywhere;
    word-break: break-word;
  }

  .dashboard-status-pill {
    max-width: 100%;
    white-space: nowrap;
  }

  @media (max-width: 520px) {
    .menu-grid {
      gap: 10px;
    }

    .menu-card {
      padding: 14px;
      gap: 10px;
    }

    .menu-card .menu-icon {
      width: 38px;
      height: 38px;
      border-radius: 11px;
      font-size: 18px;
    }

    .menu-card .menu-arrow {
      margin-left: auto;
    }

    .dashboard-card-summary {
      margin-top: 10px;
      padding-top: 10px;
    }

    .dashboard-kpi-row {
      gap: 7px;
    }

    .dashboard-kpi {
      flex: 1 1 120px;
    }

    .dashboard-outlet-row {
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 5px 8px;
    }

    .dashboard-outlet-name {
      flex: 1 1 120px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dashboard-outlet-value {
      flex: 1 1 100%;
      text-align: left;
      white-space: normal;
      line-height: 1.45;
    }

    .dashboard-status-pill {
      margin-left: 0;
      margin-top: 4px;
    }

    .pill-group {
      max-width: 100%;
      min-width: 0;
    }

    .pill {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .meta-row,
    .scale-row,
    .machine-summary-row {
      min-width: 0;
      gap: 8px;
    }

    .meta-row .meta-val,
    .scale-row .v,
    .machine-summary-row .detail {
      min-width: 0;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
  }
  /* === MOBILE_DASHBOARD_OVERFLOW_FIX_END === */
</style>
