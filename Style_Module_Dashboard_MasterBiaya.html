<!--
===============================================================================
FILE: Style_Module_Dashboard_MasterBiaya.html  (BAGIAN 6 dari 9)
Bagian dari Style_Module_Dashboard (peta lengkap di file utama).
ISI: Kartu Master Biaya (mb-card, mb-komponen-*, progress bar, warna komponen).
Catatan: susunan 2-baris KHUSUS panel desktop #desktopMasterBiaya ada di file
utama & DesktopDensity (scoped); file ini gaya dasar (dipakai bareng HP).
===============================================================================
-->
<style>
  /* === MASTER BIAYA CARD === */
  .mb-card {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
  }

  .mb-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }

  .mb-total-block {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .mb-total-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-faint);
  }

  .mb-total-value {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  .mb-status {
    flex-shrink: 0;
  }

  .mb-komponen-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .mb-komponen-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .mb-komponen-top {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .mb-komponen-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    width: 74px;
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .mb-komponen-value {
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    width: 62px;
    flex-shrink: 0;
    text-align: right;
    white-space: nowrap;
  }

  .mb-komponen-persen {
    font-size: 10px;
    color: var(--text-faint);
    width: 46px;
    flex-shrink: 0;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .mb-progress-bar {
    height: 6px;
    flex: 1;
    background: var(--panel-2);
    border-radius: 3px;
  }


  .mb-progress-fill {
    height: 100%;
    border-radius: 3px;
  }

  .mb-progress-fill.mb-gas { background: var(--brass); }
  .mb-progress-fill.mb-listrik { background: var(--volt, #e8d44d); }
  .mb-progress-fill.mb-air { background: var(--sage); }
  .mb-progress-fill.mb-nota { background: var(--text-dim); }
  .mb-progress-fill.mb-chemical { background: var(--indigo, #6366f1); }
  .mb-progress-fill.mb-packing { background: var(--clay, #A3765C); }

  .mb-missing {
    font-size: 10.5px;
    color: var(--brass);
    padding: 6px 10px;
    background: rgba(180, 130, 60, 0.08);
    border-radius: var(--radius);
  }
  .mb-bar-wrap { display: flex; align-items: center; gap: 6px; flex: 1; }
  .mb-komponen-row.zero .mb-komponen-label,
  .mb-komponen-row.zero .mb-komponen-persen { opacity: 0.35; }
  .mb-zero-label { font-size: 10px; color: var(--text-faint); font-style: italic; }

  .mb-komponen-unit { font-size: 9.5px; font-weight: 500; color: var(--text-faint); }

  /* === END MASTER BIAYA CARD === */

  /* ====================================================================
     LAYAR MASTER BIAYA (#screenMasterBiaya) - KHUSUS DESKTOP (>=1100px).
     Konsep sama dgn Dashboard & Profil Outlet: satu kartu besar utk outlet
     terpilih, berisi 6 komponen biaya (Gas/Listrik/Air/Chemical/Packing/
     Nota) sekaligus + tombol kelola (CRUD) per komponen. Brand "Kalkulator
     Laundry" + tombol Back dibuang, cukup 1 layar. HP/tablet (<1100px)
     TIDAK PERNAH masuk media query ini -> tetap pakai pill kategori +
     pilih cabang lama (.masterbiaya-mobile-only), tidak berubah.
     ==================================================================== */
  .masterbiaya-desktop { display: none; }

  @media (min-width: 1100px) {
    #screenMasterBiaya .masterbiaya-mobile-only { display: none; }
    #screenMasterBiaya .masterbiaya-desktop { display: flex; flex-direction: column; gap: 14px; }

    body:has(#screenMasterBiaya.active) .app-header { display: none !important; }
    body:has(#screenMasterBiaya.active) { padding-top: 4px; }
    body:has(#screenMasterBiaya.active) .wrap { width: min(100%, 1200px); }

    #screenMasterBiaya .dashboard-header {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 18px;
      margin-bottom: 0;
      box-shadow: 0 1px 2px rgba(17,24,39,0.03);
    }
    #screenMasterBiaya .dashboard-header-top { align-items: center; }
    #screenMasterBiaya .dashboard-title { font-size: 16px; margin-bottom: 0; letter-spacing: -0.01em; }

    body:has(#screenMasterBiaya.active) .outlet-filter-pill { max-width: none; }
    body:has(#screenMasterBiaya.active) .outlet-kategori-badge {
      display: inline-flex; align-items: center; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.04em; color: var(--brass);
      background: rgba(var(--brass-rgb, 180, 130, 60), 0.10);
      border: 1px solid rgba(var(--brass-rgb, 180, 130, 60), 0.22);
      border-radius: 999px; padding: 2px 8px; margin: 0 2px; white-space: nowrap; flex-shrink: 0;
    }

    #screenMasterBiaya .masterbiaya-desktop-panel { padding: 22px 24px; }

    /* Baris total biaya per load - ringkasan cepat di atas 6 kartu. */
    .mb-desktop-total-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding-bottom: 16px;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .mb-desktop-total-row .k { font-size: 13px; color: var(--text-dim); font-weight: 500; }
    .mb-desktop-total-row .v { font-size: 22px; font-weight: 800; color: var(--text); font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }

    /* Grid 6 kartu komponen - 3 kolom, muat 1 layar tanpa scroll. */
    .mb-desktop-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }
    .mb-desktop-card {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 0;
      border-left: 3px solid var(--border);
    }
    .mb-desktop-card.tone-flame { border-left-color: var(--flame); }
    .mb-desktop-card.tone-volt { border-left-color: var(--volt); }
    .mb-desktop-card.tone-sage { border-left-color: var(--sage); }
    .mb-desktop-card.tone-indigo { border-left-color: var(--indigo); }
    .mb-desktop-card.tone-clay { border-left-color: var(--clay); }
    .mb-desktop-card.tone-brass { border-left-color: var(--brass); }
    .mb-desktop-card.is-empty { opacity: 0.72; }

    .mb-desktop-card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .mb-desktop-label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-dim);
    }
    .mb-desktop-manage-btn {
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px 12px;
      cursor: pointer;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .mb-desktop-manage-btn:hover { border-color: var(--brass); color: var(--brass); }

    .mb-desktop-value {
      font-size: 21px;
      font-weight: 800;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.01em;
      line-height: 1.1;
    }
    .mb-desktop-unit { font-size: 11px; font-weight: 500; color: var(--text-faint); }
    .mb-desktop-empty { font-size: 13px; font-weight: 500; color: var(--text-faint); font-style: italic; }
    .mb-desktop-persen { font-size: 11px; color: var(--text-faint); }
  }
</style>
