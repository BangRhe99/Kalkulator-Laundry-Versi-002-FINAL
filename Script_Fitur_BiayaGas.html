<script>
"use strict";
  function openGasList(cabangId) {
    view.gasCabangId = cabangId;
    showScreen("gasList");
    document.getElementById("gasListTitle").textContent = "Analisa Biaya Gas";
    document.getElementById("gasListCount").textContent = "memuat...";
    document.getElementById("gasList").innerHTML = "";
    document.getElementById("gasListEmpty").style.display = "none";

    // SWR: kalau daftar gas outlet ini sudah pernah dibuka sesi ini, tampil
    // INSTAN dari cache lalu di-refresh di belakang.
    cachedServerRead_("listBiayaGas", cabangId, function (res, fromCache) {
      if (view.gasCabangId !== cabangId || view.screen !== "gasList") return;
      if (!res || !res.ok) {
        if (!fromCache) {
          handleBackendError(res, "memuat data biaya gas");
          showScreen("masterBiaya");
          refreshBiayaPickCabangList();
        }
        return;
      }
      gasCabangCache = res.data.cabang;
      gasItemsCache = res.data.items;
      document.getElementById("gasListTitle").textContent = "Analisa Biaya Gas · " + (gasCabangCache.namaLaundry || "(Tanpa nama)");
      renderGasList();
    }, function (err, hadCache) {
      if (hadCache) return;
      handleBackendError({ error: err && err.message ? err.message : String(err), stage: "client:listBiayaGas" }, "memuat data biaya gas");
      showScreen("masterBiaya");
      refreshBiayaPickCabangList();
    });
  }
  window.openGasList = openGasList;

  function renderGasList() {
    var listEl = document.getElementById("gasList");
    var emptyEl = document.getElementById("gasListEmpty");
    var countEl = document.getElementById("gasListCount");

    countEl.textContent = gasItemsCache.length + " data";
    listEl.innerHTML = "";

    if (gasItemsCache.length === 0) {
      emptyEl.style.display = "block";
      return;
    }
    emptyEl.style.display = "none";

    gasItemsCache.forEach(function (entry) {
      var record = entry.record;
      var summary = entry.summary;

      var card = document.createElement("div");
      card.className = "gas-card";

      var hasDryerRef = !!record.dryerRefId;
      var hasSetrikaRef = !!record.setrikaRefId;

      var warningParts = [];
      if (hasDryerRef && !summary.statusValidDryer) {
        warningParts.push("Mesin pengering acuan untuk data ini sudah tidak ada di profil cabang.");
      }
      if (hasSetrikaRef && !summary.statusValidSetrika) {
        warningParts.push("Mesin setrika uap acuan untuk data ini sudah tidak ada di profil cabang.");
      }
      var warningHtml = warningParts.length
        ? "<div class=\"gas-warning\">" + escapeHtml(warningParts.join(" ")) + " Edit data ini dan pilih ulang acuannya.</div>"
        : "";

      var acuanRowHtml =
        (hasDryerRef ? "<div class=\"meta-row\"><span class=\"meta-label\">Acuan dryer</span><span class=\"meta-val\">" + escapeHtml(summary.dryerRefNama) + "</span></div>" : "") +
        (hasSetrikaRef ? "<div class=\"meta-row\"><span class=\"meta-label\">Acuan setrika</span><span class=\"meta-val\">" + escapeHtml(summary.setrikaRefNama) + "</span></div>" : "");

      var resultGridHtml =
        "<div class=\"gas-result-grid\">" +
          "<div class=\"gas-result-cell\"><div class=\"label\">Konversi waktu</div><div class=\"val\">" + formatNum(summary.konversiMenit) + "<span class=\"unit\">menit</span></div></div>" +
          (hasDryerRef ? "<div class=\"gas-result-cell\"><div class=\"label\">Estimasi load</div><div class=\"val\">" + formatNum(summary.estimasiLoadPemakaian) + "<span class=\"unit\">load</span></div></div>" : "") +
        "</div>" +
        "<div class=\"gas-result-grid\">" +
          "<div class=\"gas-result-cell\"><div class=\"label\">Biaya / jam</div><div class=\"val\">" + money0(summary.biayaPerJam) + "</div></div>" +
          "<div class=\"gas-result-cell\"><div class=\"label\">Biaya / menit</div><div class=\"val\">" + formatRupiah(summary.biayaPerMenit) + "</div></div>" +
        "</div>" +
        (hasDryerRef ?
          "<div class=\"gas-result-grid\" style=\"grid-template-columns:1fr;\">" +
            "<div class=\"gas-result-cell highlight\"><div class=\"label\">Biaya Gas Dryer Per Load</div><div class=\"val\">" + money0(summary.biayaPerLoad) + "</div></div>" +
          "</div>" : "") +
        (hasSetrikaRef ?
          "<div class=\"gas-result-grid\" style=\"grid-template-columns:1fr;\">" +
            "<div class=\"gas-result-cell highlight\"><div class=\"label\">Biaya Gas Setrika Per Jam</div><div class=\"val\">" + money0(summary.biayaGasSetrikaPerJam) + "</div></div>" +
          "</div>" : "");

      card.innerHTML =
        "<div class=\"gas-card-top\">" +
          "<div class=\"title-group\">" +
            "<span class=\"flame-dot\"></span>" +
            "<h3>" + escapeHtml(record.kapasitasLabel) + "</h3>" +
          "</div>" +
          "<div class=\"actions\">" +
            "<button class=\"icon-btn\" type=\"button\" aria-label=\"Edit\" data-action=\"edit\">&#9998;</button>" +
            "<button class=\"icon-btn\" type=\"button\" aria-label=\"Hapus\" data-action=\"delete\">&#10005;</button>" +
          "</div>" +
        "</div>" +
        "<div class=\"meta-row\"><span class=\"meta-label\">Harga per tabung</span><span class=\"meta-val\">" + money0(record.hargaPerTabung) + "</span></div>" +
        "<div class=\"meta-row\"><span class=\"meta-label\">Estimasi pemakaian</span><span class=\"meta-val\">" + formatNum(record.estimasiPemakaianJam) + " jam</span></div>" +
        acuanRowHtml +
        "<div class=\"gas-card-result\">" +
          resultGridHtml +
          warningHtml +
        "</div>";

      card.querySelector("[data-action='edit']").addEventListener("click", function () { openGasFormEdit(record.id); });
      card.querySelector("[data-action='delete']").addEventListener("click", function () { openConfirmDeleteGas(record); });

      listEl.appendChild(card);
    });
  }

  function openConfirmDeleteGas(record) {
    document.getElementById("confirmTitle").textContent = "Hapus data gas ini?";
    document.getElementById("confirmText").textContent =
      "Data biaya gas \"" + (record.kapasitasLabel || "ini") + "\" akan dihapus permanen dan tidak bisa dikembalikan.";
    document.getElementById("confirmOverlay").classList.add("show");

    var btn = document.getElementById("confirmDeleteBtn");
    btn.onclick = function () { confirmDeleteGas(record.id); };
  }

  function confirmDeleteGas(id) {
    var btn = document.getElementById("confirmDeleteBtn");
    btn.disabled = true;
    btn.textContent = "Menghapus...";

    google.script.run
      .withSuccessHandler(function (res) {
        btn.disabled = false;
        btn.textContent = "Hapus";
        closeConfirm();
        if (!res || !res.ok) { handleBackendError(res, "menghapus data gas"); return; }
        showToast("Data gas berhasil dihapus.", "ok");
        invalidateServerReadCache_("listBiayaGas", view.gasCabangId);
        invalidateServerReadCache_("getBiayaGas");
        openGasList(view.gasCabangId);
      })
      .withFailureHandler(function (err) {
        btn.disabled = false;
        btn.textContent = "Hapus";
        handleBackendError({ error: err && err.message ? err.message : String(err), stage: "client:deleteBiayaGas" }, "menghapus data gas");
      })
      .deleteBiayaGas(id);
  }

  function defaultGasRecord(cabangId) {
    return {
      id: null,
      cabangId: cabangId,
      dryerRefId: "",
      setrikaRefId: "",
      kapasitasLabel: "",
      kapasitasKg: 0,
      hargaPerTabung: 0,
      estimasiPemakaianJam: 0,
      createdAt: null,
      updatedAt: null
    };
  }

  function getCabangLiteFromCache(cabangId) {
    return cabangListCache.find(function (x) { return x.id === cabangId; }) || { id: cabangId, namaLaundry: "" };
  }

  function defaultNotaKasirRecordClient(cabangId) {
    return {
      id: null,
      cabangId: cabangId,
      sistemNotaKasir: "aplikasi_kasir_thermal",
      metodeBiayaAplikasi: "biaya_langsung_per_transaksi",
      biayaPerTransaksi: 0,
      biayaBulananAplikasi: 0,
      estimasiTransaksiPerBulan: 0,
      hargaPerRoll: 0,
      transaksiPerRoll: 0,
      hargaSatuanAwalNota: 0,
      jumlahLembarNota: 0,
      notaPerTransaksi: 0,
      createdAt: null,
      updatedAt: null
    };
  }

  function syncNotaKasirPillStates() {
    if (!notaKasirFormState) return;

    var sistemPills = document.querySelectorAll("#notaKasirSistemPills .pill");
    sistemPills.forEach(function (pill) {
      pill.classList.toggle("active", pill.getAttribute("data-val") === notaKasirFormState.sistemNotaKasir);
    });

    var metodePills = document.querySelectorAll("#notaKasirMetodePills .pill");
    metodePills.forEach(function (pill) {
      pill.classList.toggle("active", pill.getAttribute("data-val") === notaKasirFormState.metodeBiayaAplikasi);
    });
  }

  window.openGasFormNew = function () {
    if (!gasCabangCache) { showToast("Pilih cabang terlebih dahulu.", "err"); return; }
    view.gasIsNew = true;
    view.gasEditingId = null;
    gasFormState = defaultGasRecord(view.gasCabangId);
    showScreen("gasForm");
    document.getElementById("gasFormTitle").textContent = "Tambah Analisa Biaya Gas";
    renderGasForm();
    setSaveStatus("", "");
  };

  function openGasFormEdit(id) {
    view.gasIsNew = false;
    view.gasEditingId = id;
    showScreen("gasForm");
    document.getElementById("gasFormTitle").textContent = "Edit Analisa Biaya Gas";
    setSaveStatus("Memuat...", "busy");

    // SWR "render sekali": tampil INSTAN dari cache; hasil server yang datang
    // belakangan TIDAK menimpa form supaya ketikan user aman (gasRendered).
    var gasRendered = false;
    cachedServerRead_("getBiayaGas", id, function (res, fromCache) {
      if (view.gasEditingId !== id || view.screen !== "gasForm") return;
      if (!res || !res.ok) {
        if (!fromCache) {
          handleBackendError(res, "memuat data gas untuk diedit");
          openGasList(view.gasCabangId);
        }
        return;
      }
      if (!fromCache && gasRendered) return;
      gasFormState = res.data.record;
      renderGasForm();
      setSaveStatus("", "");
      gasRendered = true;
    }, function (err, hadCache) {
      if (hadCache) return;
      handleBackendError({ error: err && err.message ? err.message : String(err), stage: "client:getBiayaGas" }, "memuat data gas untuk diedit");
      openGasList(view.gasCabangId);
    });
  }

  /**
   * renderGasKapasitasPills membangun pilihan cepat dari BIAYA_GAS_PRESET
   * ditambah satu pill "Custom" supaya ukuran tabung di luar daftar (mis.
   * 22 Kg buatan sendiri) tetap bisa diinput lewat field kapasitasCustomKg.
   */
  function renderGasKapasitasPills() {
  var container = document.getElementById("gasKapasitasPills");
  container.innerHTML = "";

  var matchedPreset = BIAYA_GAS_PRESET.find(function (p) {
    return p.label === gasFormState.kapasitasLabel;
  });

  var isCustom =
    gasFormState.kapasitasLabel === "custom" ||
    (!matchedPreset && gasFormState.kapasitasLabel && gasFormState.kapasitasLabel.length > 0);

  BIAYA_GAS_PRESET.forEach(function (preset) {
    var pill = document.createElement("div");
    pill.className = "pill flame" + (gasFormState.kapasitasLabel === preset.label ? " active" : "");
    pill.textContent = preset.label;
    pill.addEventListener("click", function () {
      selectGasPreset(preset);
    });
    container.appendChild(pill);
  });

  var customPill = document.createElement("div");
  customPill.className = "pill flame" + (isCustom ? " active" : "");
  customPill.textContent = "Custom";
  customPill.addEventListener("click", function () {
    selectGasCustom();
  });
  container.appendChild(customPill);

  var customField = document.getElementById("gasKapasitasCustomField");
  var customInput = document.getElementById("gasKapasitasCustomKg");

  customField.style.display = isCustom ? "block" : "none";

  if (isCustom && customInput) {
    customInput.value = gasFormState.kapasitasKg || "";
  } else if (customInput) {
    customInput.value = "";
    customInput.classList.remove("input-err");
  }
}

  function selectGasPreset(preset) {
    gasFormState.kapasitasLabel = preset.label;
    gasFormState.kapasitasKg = preset.kapasitasKg;
    // Hanya isi estimasi jam otomatis jika field masih kosong (0), supaya
    // tidak menimpa angka yang sudah diubah manual oleh user saat ganti-ganti pill.
    if (!gasFormState.estimasiPemakaianJam) {
      gasFormState.estimasiPemakaianJam = preset.estimasiJam;
    }
    renderGasKapasitasPills();
    syncGasFormFieldsFromState();
    renderGasFormPreview();
  }

function selectGasCustom() {
  gasFormState.kapasitasLabel = "custom";
  gasFormState.kapasitasKg = 0;

  renderGasKapasitasPills();
  syncGasFormFieldsFromState();
  renderGasFormPreview();

  var input = document.getElementById("gasKapasitasCustomKg");
  if (input) {
    input.focus();
  }
}

  function renderGasDryerOptions() {
    var select = document.getElementById("gasDryerRef");
    select.innerHTML = "";

    var dryers = (gasCabangCache && gasCabangCache.mesinPengering) || [];

    if (dryers.length === 0) {
      var opt = document.createElement("option");
      opt.value = "";
      opt.textContent = "Belum ada mesin pengering di profil cabang ini";
      select.appendChild(opt);
      select.disabled = true;
      return;
    }
    select.disabled = false;

    var placeholder = document.createElement("option");
    placeholder.value = "";
    placeholder.textContent = "Pilih mesin pengering acuan";
    select.appendChild(placeholder);

    dryers.forEach(function (m, idx) {
      var opt = document.createElement("option");
      opt.value = m.id;
      opt.textContent = "Unit #" + (idx + 1) + " · " + machineDisplayName(m);
      if (m.id === gasFormState.dryerRefId) opt.selected = true;
      select.appendChild(opt);
    });
  }

  function gasSetrikaUapList() {
    var all = (gasCabangCache && gasCabangCache.mesinSetrika) || [];
    return all.filter(function (m) { return m.jenis === "uap"; });
  }

  function renderGasSetrikaOptions() {
    var select = document.getElementById("gasSetrikaRef");
    if (!select) return;
    select.innerHTML = "";

    var setrikaUap = gasSetrikaUapList();

    if (setrikaUap.length === 0) {
      var opt = document.createElement("option");
      opt.value = "";
      opt.textContent = "Belum ada mesin setrika uap di profil cabang ini";
      select.appendChild(opt);
      select.disabled = true;
      return;
    }
    select.disabled = false;

    var placeholder = document.createElement("option");
    placeholder.value = "";
    placeholder.textContent = "Pilih mesin setrika uap acuan";
    select.appendChild(placeholder);

    setrikaUap.forEach(function (m, idx) {
      var opt = document.createElement("option");
      opt.value = m.id;
      opt.textContent = "Unit #" + (idx + 1) + " · Setrika Uap · " + formatNum(m.kapasitasKgPerJam || 0) + " kg/jam";
      if (m.id === gasFormState.setrikaRefId) opt.selected = true;
      select.appendChild(opt);
    });
  }

  /**
   * renderGasAcuanUI: satu tabung gas bisa dipakai bareng untuk Dryer DAN
   * Setrika Uap sekaligus (bukan pilihan eksklusif) - field acuan mesin
   * pengering & acuan mesin setrika uap ditampilkan berbarengan, mengikuti
   * mesin apa saja yang ada di Profil Outlet cabang ini. Kalau outlet tidak
   * punya mesin setrika uap, field & hasil "Gas Setrika" disembunyikan total.
   */
  function renderGasAcuanUI() {
    var dryers = (gasCabangCache && gasCabangCache.mesinPengering) || [];
    var setrikaUap = gasSetrikaUapList();
    var hasDryer = dryers.length > 0;
    var hasSetrikaUap = setrikaUap.length > 0;

    var dryerWrap = document.getElementById("gasDryerRefWrap");
    var setrikaWrap = document.getElementById("gasSetrikaRefWrap");
    if (dryerWrap) dryerWrap.style.display = hasDryer ? "" : "none";
    if (setrikaWrap) setrikaWrap.style.display = hasSetrikaUap ? "" : "none";

    renderGasDryerOptions();
    renderGasSetrikaOptions();
  }

  function syncGasFormFieldsFromState() {
    document.getElementById("gasHarga").value = gasFormState.hargaPerTabung ? Number(gasFormState.hargaPerTabung).toLocaleString("id-ID") : "";
    document.getElementById("gasEstimasiJam").value = gasFormState.estimasiPemakaianJam || "";
  }

  function renderGasForm() {
    renderGasKapasitasPills();
    syncGasFormFieldsFromState();
    renderGasAcuanUI();
    renderGasFormPreview();
  }

  /**
   * renderGasFormPreview: pratinjau real-time menggunakan dryer/setrika yang
   * SEDANG dipilih di dropdown (mengikuti formState saat ini, bukan hasil
   * tersimpan sebelumnya), supaya saat user ganti-ganti acuan, angka di bawah
   * langsung berubah tanpa perlu klik Simpan dulu. Dryer & Setrika Uap
   * dihitung DAN ditampilkan berbarengan (bukan pilihan eksklusif), masing-
   * masing disembunyikan kalau outlet tidak punya mesin jenis itu.
   */
  function renderGasFormPreview() {
    var hasDryer = ((gasCabangCache && gasCabangCache.mesinPengering) || []).length > 0;
    var hasSetrikaUap = gasSetrikaUapList().length > 0;
    var dryers = (gasCabangCache && gasCabangCache.mesinPengering) || [];
    var dryer = dryers.find(function (m) { return m.id === gasFormState.dryerRefId; }) || null;
    var setrika = gasSetrikaUapList().find(function (m) { return m.id === gasFormState.setrikaRefId; }) || null;

    var summary = computeBiayaGasSummaryClient(gasFormState, dryer, setrika);

    document.getElementById("gfKonversiMenit").innerHTML = formatNum(summary.konversiMenit) + "<span class=\"unit\">menit</span>";
    document.getElementById("gfEstimasiLoad").innerHTML = formatNum(summary.estimasiLoadPemakaian) + "<span class=\"unit\">load</span>";
    document.getElementById("gfBiayaJam").textContent = money0(summary.biayaPerJam);
    document.getElementById("gfBiayaMenit").textContent = formatRupiah(summary.biayaPerMenit);
    document.getElementById("gfBiayaLoad").textContent = money0(summary.biayaPerLoad);
    document.getElementById("gfBiayaSetrikaPerJam").textContent = money0(summary.biayaGasSetrikaPerJam);

    var estimasiLoadCell = document.getElementById("gfEstimasiLoadCell");
    var biayaLoadRow = document.getElementById("gfBiayaLoadRow");
    var biayaSetrikaRow = document.getElementById("gfBiayaSetrikaRow");
    if (estimasiLoadCell) estimasiLoadCell.style.display = hasDryer ? "" : "none";
    if (biayaLoadRow) biayaLoadRow.style.display = hasDryer ? "" : "none";
    if (biayaSetrikaRow) biayaSetrikaRow.style.display = hasSetrikaUap ? "" : "none";

    var warnEl = document.getElementById("gfWarning");
    var warnings = [];
    if (hasDryer && !summary.statusValidDryer) {
      warnings.push("Pilih mesin pengering acuan agar estimasi load dan Biaya Gas Dryer Per Load bisa dihitung.");
    }
    if (hasSetrikaUap && !summary.statusValidSetrika) {
      warnings.push("Pilih mesin setrika uap acuan agar Biaya Gas Setrika Per Jam bisa dihitung.");
    }
    if (warnings.length) {
      warnEl.style.display = "block";
      warnEl.textContent = warnings.join(" ");
    } else {
      warnEl.style.display = "none";
    }
  }

  function bindGasFormInputs() {
    document.getElementById("gasKapasitasCustomKg").addEventListener("input", function (e) {
      gasFormState.kapasitasKg = Number(e.target.value) || 0;
      if (!gasFormState.kapasitasLabel) {
        // Label custom disusun dari angka yang diketik, supaya tetap punya
        // identitas tampil di kartu list (mis. "22 Kg").
      }
      renderGasFormPreview();
    });

    document.getElementById("gasHarga").addEventListener("input", function (e) {
      var digitsOnly = e.target.value.replace(/[^0-9]/g, "");
      var numVal = Number(digitsOnly) || 0;
      gasFormState.hargaPerTabung = numVal;
      e.target.value = numVal > 0 ? numVal.toLocaleString("id-ID") : "";
      renderGasFormPreview();
    });

    document.getElementById("gasEstimasiJam").addEventListener("input", function (e) {
      gasFormState.estimasiPemakaianJam = Number(e.target.value) || 0;
      renderGasFormPreview();
    });

    document.getElementById("gasDryerRef").addEventListener("change", function (e) {
      gasFormState.dryerRefId = e.target.value;
      renderGasFormPreview();
    });

    document.getElementById("gasSetrikaRef").addEventListener("change", function (e) {
      gasFormState.setrikaRefId = e.target.value;
      renderGasFormPreview();
    });

  }

  function saveGasForm() {
    // Validasi ringan di sisi klien dulu (UX cepat), validasi penuh & otoritatif
    // tetap di backend (validateBiayaGas_) ÃƒÂ¢Ã¢â€šÂ¬Ã¢â‚¬Â lihat catatan arsitektur Code.gs.
    var isCustom = !BIAYA_GAS_PRESET.some(function (p) { return p.label === gasFormState.kapasitasLabel; });
    if (isCustom) {
      var customKg = Number(document.getElementById("gasKapasitasCustomKg").value) || 0;
      if (customKg <= 0) {
        showToast("Isi kapasitas custom (Kg) terlebih dahulu.", "err");
        document.getElementById("gasKapasitasCustomKg").classList.add("input-err");
        return;
      }
      gasFormState.kapasitasKg = customKg;
      gasFormState.kapasitasLabel = formatNum(customKg).replace(".", ",") + " Kg";
    }

    // Satu tabung gas bisa dipakai bareng untuk Dryer DAN Setrika Uap - acuan
    // mana yang wajib diisi mengikuti mesin apa saja yang ada di profil.
    var hasDryer = ((gasCabangCache && gasCabangCache.mesinPengering) || []).length > 0;
    var hasSetrikaUap = gasSetrikaUapList().length > 0;

    if (hasDryer && !gasFormState.dryerRefId) {
      showToast("Pilih mesin pengering acuan terlebih dahulu.", "err");
      document.getElementById("gasDryerRef").classList.add("input-err");
      return;
    }
    document.getElementById("gasDryerRef").classList.remove("input-err");

    if (hasSetrikaUap && !gasFormState.setrikaRefId) {
      showToast("Pilih mesin setrika uap acuan terlebih dahulu.", "err");
      document.getElementById("gasSetrikaRef").classList.add("input-err");
      return;
    }
    document.getElementById("gasSetrikaRef").classList.remove("input-err");

    var btn = document.getElementById("gasSaveBtn");
    if (btn) { btn.disabled = true; btn.textContent = "Menyimpan..."; }
    setSaveStatus("Menyimpan...", "busy");

    function onDone(res, actionLabel, restoreLabel) {
      if (btn) { btn.disabled = false; btn.textContent = restoreLabel; }
      if (!res || !res.ok) { handleBackendError(res, actionLabel); return; }
      showToast("Data biaya gas tersimpan.", "ok");
      setSaveStatus("Tersimpan", "ok");
      invalidateServerReadCache_("listBiayaGas", view.gasCabangId);
      invalidateServerReadCache_("getBiayaGas");
      showScreen("masterBiaya");
      refreshBiayaPickCabangList();
    }

    if (view.gasIsNew) {
      google.script.run
        .withSuccessHandler(function (res) { onDone(res, "menyimpan data gas baru", "Simpan data gas"); })
        .withFailureHandler(function (err) {
          if (btn) { btn.disabled = false; btn.textContent = "Simpan data gas"; }
          handleBackendError({ error: err && err.message ? err.message : String(err), stage: "client:createBiayaGas" }, "menyimpan data gas baru");
        })
        .createBiayaGas(gasFormState);
    } else {
      google.script.run
        .withSuccessHandler(function (res) { onDone(res, "menyimpan perubahan data gas", "Simpan perubahan"); })
        .withFailureHandler(function (err) {
          if (btn) { btn.disabled = false; btn.textContent = "Simpan perubahan"; }
          handleBackendError({ error: err && err.message ? err.message : String(err), stage: "client:updateBiayaGas" }, "menyimpan perubahan data gas");
        })
        .updateBiayaGas(view.gasEditingId, gasFormState);
    }
  }
