<!--
===============================================================================
FILE: Script_Boot_Diagnostics.html
PROJECT: Kalkulator Laundry Versi 002
ISI: Penangkap error boot paling awal

FUNGSI:
window.onerror + unhandledrejection handler + window.__showBootDiagnosticError.
Menangkap error JS fatal sebelum app sempat render, lalu menampilkan pesan
error asli (bukan layar putih kosong). File ini SENGAJA dibungkus IIFE sendiri
(function(){...})() karena benar-benar berdiri sendiri -- tidak memanggil dan
tidak dipanggil fungsi dari file Script_ lain kecuali lewat window.*.
WAJIB jadi file JS PALING PERTAMA yang di-include, sebelum semua Script_Shared/Fitur,
supaya error di file manapun sesudahnya tetap tertangkap.
===============================================================================
-->
<script>
(function () {
  function escapeDiagnosticHtml_(value) {
    return String(value == null ? "" : value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  window.__showBootDiagnosticError = function (title, detail) {
    var message = title + "\n\n" + detail;

    try {
      alert(message);
    } catch (alertErr) {
      // Kalau alert diblokir sandbox/browser, lanjut tampilkan ke HTML.
    }

    try {
      var loadingEl = document.getElementById("loadingState");
      var appRootEl = document.getElementById("appRoot");

      if (loadingEl) {
        loadingEl.style.display = "none";
      }

      // Overlay splash loading (kalau ada) tidak boleh menutupi pesan error.
      var premiumLoaderEl = document.getElementById("premiumLoader");
      if (premiumLoaderEl) {
        premiumLoaderEl.classList.remove("is-visible");
        premiumLoaderEl.classList.remove("is-hiding");
      }

      if (!appRootEl) {
        appRootEl = document.createElement("div");
        appRootEl.id = "appRoot";
        document.body.appendChild(appRootEl);
      }

      appRootEl.style.display = "block";
      appRootEl.innerHTML =
        '<div style="margin:16px; padding:16px; border:2px solid #dc2626; border-radius:12px; background:#fff5f5; color:#111827; font-family:Arial,sans-serif;">' +
          '<h2 style="margin:0 0 10px; color:#dc2626;">' + escapeDiagnosticHtml_(title) + '</h2>' +
          '<p style="margin:0 0 10px; line-height:1.6;">Ini adalah error asli dari JavaScript di dalam iframe aplikasi.</p>' +
          '<pre style="white-space:pre-wrap; overflow:auto; background:#111827; color:#fff; padding:12px; border-radius:10px; font-size:13px; line-height:1.5;">' +
            escapeDiagnosticHtml_(detail) +
          '</pre>' +
        '</div>';
    } catch (domErr) {
      // Kalau DOM juga gagal, minimal alert sudah dicoba.
    }
  };

  window.onerror = function (msg, src, line, col, err) {
    var detail =
      "Message: " + msg +
      "\nSource: " + (src || "-") +
      "\nLine: " + (line || "-") +
      "\nColumn: " + (col || "-") +
      "\nStack:\n" + (err && err.stack ? err.stack : "-");

    window.__showBootDiagnosticError("GLOBAL ERROR", detail);

    return false;
  };

  window.addEventListener("unhandledrejection", function (event) {
    var reason = event && event.reason ? event.reason : event;
    var detail =
      "Unhandled Promise Rejection" +
      "\nMessage: " + (reason && reason.message ? reason.message : String(reason)) +
      "\nStack:\n" + (reason && reason.stack ? reason.stack : "-");

    window.__showBootDiagnosticError("PROMISE ERROR", detail);
  });
})();
</script>
