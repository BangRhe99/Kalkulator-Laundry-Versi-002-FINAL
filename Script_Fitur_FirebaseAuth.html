<!--
===============================================================================
FILE: Script_Fitur_FirebaseAuth.html
ISI: Init Firebase SDK (client) + wrapper tipis untuk kirim/selesaikan magic
link (Email Link Sign-In) - dipakai HANYA untuk membuktikan kepemilikan email
saat DAFTAR (ganti kode OTP lama) & saat RESET PASSWORD (ganti kode reset
lama). Login sehari-hari TETAP email+password (Modul_Auth.gs, tidak berubah).

Firebase idToken hasil signInWithEmailLink dipakai SEKALI (dikirim ke server
lewat verifyEmailMagicLink/confirmPasswordResetMagicLink, Modul_Auth.gs) lalu
langsung signOut() dari Firebase - sesi login sesungguhnya (authSession_)
tetap sistem kita sendiri, bukan Firebase.

[2026-07-21/22] Divalidasi lewat eksperimen sesi sebelumnya: magic link BISA
selesai dari dalam iframe sandbox Apps Script (n-xxxx-script.googleusercontent.com)
setelah 2 syarat dipenuhi: apiKey benar (jangan typo!) & origin di-allowlist
di Firebase Console > Authentication > Settings > Authorized domains. Kalau
nanti dibuat DEPLOYMENT BARU (bukan versi baru dari deployment yang sama),
origin sandbox mungkin berubah & perlu di-allowlist ulang.

Include SEBELUM Script_Fitur_Auth.html (yang memanggil wrapper di file ini).
===============================================================================
-->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script>
"use strict";
  // SAMA PERSIS dengan FIREBASE_WEB_API_KEY_ di Modul_Auth.gs - kalau project
  // Firebase pernah diganti/key di-rotate, update DUA-DUANYA. Web API key
  // Firebase memang didesain publik (bukan rahasia).
  var firebaseConfig_ = {
    apiKey: "AIzaSyC06_ALEXOK9R_aL7bSvIVI7u_d0ANlSyk",
    authDomain: "secret-cipher-488105-f2.firebaseapp.com",
    projectId: "secret-cipher-488105-f2",
    storageBucket: "secret-cipher-488105-f2.firebasestorage.app",
    messagingSenderId: "339840190577",
    appId: "1:339840190577:web:191a61ca0302b8ba7533d0",
  };
  var firebaseAuthReady_ = Promise.resolve();
  try {
    firebase.initializeApp(firebaseConfig_);
    // [FIX 2026-07-22] Halaman ini jalan DI DALAM iframe sandbox cross-origin
    // Apps Script (n-xxxx-script.googleusercontent.com di dalam
    // script.google.com) - browser modern (terutama mobile) sering
    // MEMBLOKIR/mem-partisi akses IndexedDB pihak-ketiga di konteks begini.
    // Firebase Auth SDK defaultnya coba simpan state ke IndexedDB DULU
    // sebelum operasi apa pun (termasuk sendSignInLinkToEmail) - kalau akses
    // itu diblokir, operasi PALING AWAL gagal instan (sebelum email sempat
    // terkirim). Persistence NONE (in-memory saja) menghindari IndexedDB
    // sama sekali - aman karena idToken cuma dipakai sekali lalu dibuang
    // (lihat authFirebaseCompleteMagicLink_), tidak butuh persist antar
    // reload. authFirebaseSendMagicLink_/authFirebaseCompleteMagicLink_
    // menunggu promise ini SELESAI dulu sebelum jalan.
    firebaseAuthReady_ = firebase.auth().setPersistence(firebase.auth.Auth.Persistence.NONE).catch(function (e) {
      console.error("[FirebaseAuth] setPersistence gagal:", e);
    });
  } catch (e) {
    console.error("[FirebaseAuth] init gagal:", e);
  }

  var AUTH_EMAIL_FOR_SIGNIN_KEY_ = "emailForSignIn";

  /**
   * authFirebaseSendMagicLink_: kirim magic link ke email, continueUrl bawa
   * ?authPurpose=register|resetPassword supaya saat link diklik & halaman
   * dimuat ulang, authHandleBootAuth_ (Script_Fitur_Auth.html) tahu proses
   * mana yang harus dilanjutkan. Simpan email ke localStorage (pola resmi
   * Firebase) supaya kalau link diklik di TAB/DEVICE YANG SAMA, tidak perlu
   * ketik ulang email.
   */
  window.authFirebaseSendMagicLink_ = function (email, purpose) {
    var continueUrl = window.location.origin + window.location.pathname + "?authPurpose=" + encodeURIComponent(purpose);
    return firebaseAuthReady_.then(function () {
      return firebase.auth().sendSignInLinkToEmail(email, {
        url: continueUrl,
        handleCodeInApp: true
      });
    }).then(function () {
      try { window.localStorage.setItem(AUTH_EMAIL_FOR_SIGNIN_KEY_, email); } catch (e) {}
    });
  };

  window.authFirebaseIsMagicLink_ = function () {
    try {
      return firebase.auth().isSignInWithEmailLink(window.location.href);
    } catch (e) {
      return false;
    }
  };

  window.authFirebaseGetStoredEmail_ = function () {
    try {
      return window.localStorage.getItem(AUTH_EMAIL_FOR_SIGNIN_KEY_) || "";
    } catch (e) {
      return "";
    }
  };

  window.authFirebaseClearStoredEmail_ = function () {
    try { window.localStorage.removeItem(AUTH_EMAIL_FOR_SIGNIN_KEY_); } catch (e) {}
  };

  /**
   * authFirebaseCompleteMagicLink_: selesaikan sign-in dari link yang
   * diklik, balikin idToken (dipakai server utk verifikasi - lihat
   * firebaseVerifyIdToken_, Modul_Auth.gs). Firebase sendiri langsung
   * signOut() setelah idToken didapat - state Firebase TIDAK dipakai lagi
   * setelahnya, sesi asli kita sendiri (authSession_) yang jadi sumber
   * kebenaran.
   */
  window.authFirebaseCompleteMagicLink_ = function (email) {
    return firebaseAuthReady_.then(function () {
      return firebase.auth().signInWithEmailLink(email, window.location.href);
    }).then(function (result) {
      return result.user.getIdToken().then(function (idToken) {
        firebase.auth().signOut().catch(function () {});
        return idToken;
      });
    });
  };
</script>
