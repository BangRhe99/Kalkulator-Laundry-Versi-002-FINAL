<!--
===============================================================================
FILE: Script_Fitur_Dashboard.html
PROJECT: Kalkulator Laundry Versi 002
ISI: Inti layar Dashboard (screenMenu) - fit 1-layar desktop, orkestrasi
     fetch/cache summary lintas modul, ringkasan KPI desktop, footer.

FUNGSI:
File ini adalah "otak" layar Dashboard: mengunci 3 layar "satu-outlet,
satu-layar" ke 1 layar penuh tanpa scroll (desktop), satu roundtrip
getDashboardFullSummary() lalu menyebarkan hasilnya ke 6 fungsi render kartu,
serta footer tombol aksi per layar. Kalau mau ubah tampilan/isi salah satu
KARTU dashboard, file ini BUKAN tempatnya - lihat
Script_Fitur_Dashboard_Kartu.html. Kalau mau ubah OUTLET PICKER (pill
outlet/filter), lihat Script_Fitur_Dashboard_OutletPicker.html.

DIPECAH dari 1 file 1.485 baris (2026-07-12) jadi 3 file supaya lebih mudah
dibaca & dirawat - lihat riwayat pemecahan lengkap di Index.html & panduan
pemecahan file besar di KONTEKS_PROYEK.md:
  1. Script_Fitur_Dashboard.html (file ini)          - inti/orkestrasi
  2. Script_Fitur_Dashboard_OutletPicker.html         - outlet picker/filter
  3. Script_Fitur_Dashboard_Kartu.html                - 6 render kartu + BEP mix
Fungsi & var TIDAK berubah sama sekali saat dipindah, murni potong-tempel -
tidak ada rumus atau perilaku yang diubah oleh pemecahan ini.

PENTING -- catat sebelum edit:
Semua file Script_*.html berbagi SATU scope global yang sama (Apps Script
include() cuma menggabungkan teks mentah jadi satu <script> demi <script>
di halaman yang sama -- bukan module system). Karena itu file ini SENGAJA
TIDAK dibungkus (function(){...})() -- kalau kamu bungkus lagi, fungsi di
file ini jadi tidak kelihatan dari file lain dan app akan rusak.
Urutan include TIDAK masalah untuk deklarasi function/var (hoisting),
TAPI Script_Boot_Main.html WAJIB tetap paling terakhir karena dia yang
menjalankan bootApp().

DAFTAR ISI (cari nama fungsi ini kalau butuh mengubah/memahami):
  - fitDesktopDashboardToViewport_, SINGLE_SCREEN_FIT_TARGETS_
      -> kunci 1-layar-tanpa-scroll utk 6 layar desktop (Dashboard, Profil
         Outlet, Master Biaya, Struktur HPP, Harga Layanan, Biaya Tetap).
  - setDashboardCardHtml/Loading/Error, formatDashboardRp, dashboardMoreRowsText
      -> helper generik render kartu, dipakai bareng file Kartu.
  - mapCabangRowToProfilSummary_, refreshDashboardFast
      -> render optimistik kartu Profil Outlet dari cabangListCache (tanpa
         nunggu roundtrip) begitu user ganti outlet.
  - renderDashboardFullSummary_, refreshDashboard, fetchDashboardFullSummary_
      -> satu roundtrip getDashboardFullSummary() + cache per outlet
         (stale-while-revalidate) + sebar hasil ke 6 fungsi render kartu
         (ada di Script_Fitur_Dashboard_Kartu.html).
  - setDesktopKpiMoney_/Note_/UnitValue_, renderDesktopKpiSummary_,
    renderDesktopBepChart_
      -> panel "Ringkasan Eksekutif" khusus desktop (id "desktopKpi*"),
         data SAMA PERSIS dari fetch di atas, TIDAK ada fetch tambahan.
  - renderFooter
      -> tombol aksi bawah layar (Simpan/Batal/Hapus dll), 1 fungsi utk
         SEMUA layar form di app ini.
===============================================================================

<script>
"use strict";
  /**
   * =========================================================================
   * FIT LAYAR DESKTOP KE 1 LAYAR PENUH (TANPA SCROLL)
   * -----------------------------------------------------------------------
   * Percobaan sebelumnya pakai CSS murni (vh + overflow:hidden berantai di
   * html/body) TIDAK selalu bekerja krn aturan "overflow propagation" di
   * spec CSS bisa membatalkan efeknya secara diam-diam. Diganti pakai JS:
   * window.innerHeight SELALU akurat terlepas dari propagation/iframe apa
   * pun, jadi tinggi panel konten tiap layar diukur & dikunci LANGSUNG di
   * sini, dipanggil ulang tiap ganti layar & tiap resize.
   *
   * [2026-07-12] Diperluas dari khusus Dashboard (#screenMenu) jadi 3 layar
   * "satu-outlet, satu-layar" (Dashboard, Profil Outlet, Master Biaya) -
   * pola & elemen targetnya SAMA (satu panel konten di bawah topbar tipis),
   * jadi dikelola lewat satu daftar target, bukan diduplikasi 3x. KHUSUS
   * desktop (>=1100px) DAN cuma saat salah satu layar target aktif - di HP
   * atau layar lain fungsi ini tidak melakukan apa-apa, jadi tidak pernah
   * mengubah tampilan HP atau layar lain sama sekali.
   * =========================================================================
   */
  var DASHBOARD_FIT_MIN_WIDTH_ = 1100;
  var dashboardFitResizeTimer_ = null;
  var SINGLE_SCREEN_FIT_TARGETS_ = [
    { screenId: "screenMenu", panelId: "desktopDashboardSummary", minHeight: 320 },
    { screenId: "screenList", panelId: "profilOutletDesktopPanel", minHeight: 280 },
    { screenId: "screenMasterBiaya", panelId: "masterBiayaDesktopPanel", minHeight: 280 },
    { screenId: "screenStrukturHPPList", panelId: "strukturHPPDesktopPanel", minHeight: 280 },
    { screenId: "screenHargaLayananList", panelId: "hargaLayananDesktopPanel", minHeight: 280 },
    { screenId: "screenBiayaTetapList", panelId: "biayaTetapDesktopPanel", minHeight: 280 }
  ];

  function lockDashboardViewportScroll_(lock) {
    document.documentElement.style.overflowY = lock ? "hidden" : "";
    document.body.style.overflow = lock ? "hidden" : "";
  }

  window.fitDesktopDashboardToViewport_ = function () {
    var isDesktopWidth = window.innerWidth >= DASHBOARD_FIT_MIN_WIDTH_;
    var anyLocked = false;

    SINGLE_SCREEN_FIT_TARGETS_.forEach(function (target) {
      var screenEl = document.getElementById(target.screenId);
      var panelEl = document.getElementById(target.panelId);
      if (!screenEl || !panelEl) return;

      var isActive = screenEl.classList.contains("active");
      if (!isActive || !isDesktopWidth) {
        panelEl.style.height = "";
        return;
      }

      panelEl.style.height = "";
      var rect = panelEl.getBoundingClientRect();
      var bottomGap = 10;
      var available = Math.round(window.innerHeight - rect.top - bottomGap);
      if (available < target.minHeight) available = target.minHeight;
      panelEl.style.height = available + "px";
      anyLocked = true;
    });

    lockDashboardViewportScroll_(anyLocked);
  };

  window.addEventListener("resize", function () {
    clearTimeout(dashboardFitResizeTimer_);
    dashboardFitResizeTimer_ = setTimeout(window.fitDesktopDashboardToViewport_, 120);
  });

  function setDashboardCardHtml(id, html) {
    var el = document.getElementById(id);
    if (!el) return;
    el.className = "dashboard-card-summary";
    el.innerHTML = html;
  }

  function setDashboardCardLoading(id) {
    var el = document.getElementById(id);
    if (!el) return;
    el.className = "dashboard-card-summary is-loading";
    el.innerHTML = "Memuat data...";
  }

  function setDashboardCardError(id, message) {
    setDashboardCardHtml(
      id,
      '<div class="dashboard-outlet-row is-danger">' +
        '<span class="dashboard-outlet-name">Gagal memuat</span>' +
        '<span class="dashboard-outlet-value">' + escapeHtml(message || "Coba refresh.") + '</span>' +
      '</div>'
    );
  }

  function formatDashboardRp(value) {
    var n = Number(value) || 0;
    if (typeof formatRp === "function") return formatRp(n);
    if (typeof money0 === "function") return money0(n);
    if (typeof formatRupiah === "function") return formatRupiah(n);
    return "Rp" + Math.round(n).toLocaleString("id-ID");
  }

  function dashboardMoreRowsText(total, shown) {
    var more = Math.max(0, (Number(total) || 0) - (Number(shown) || 0));
    return more > 0
      ? '<div class="dashboard-more">+' + more + ' outlet lain</div>'
      : "";
  }

  function setDashboardAllLoading(skipCabangCard) {
    if (!skipCabangCard) setDashboardCardLoading("dashboardCabangSummary");
    setDashboardCardLoading("dashboardMasterBiayaSummary");
    setDashboardCardLoading("dashboardHppSummary");
    setDashboardCardLoading("dashboardHargaLayananSummary");
    setDashboardCardLoading("dashboardFixedCostSummary");
  }

  /**
   * mapCabangRowToProfilSummary_: salinan ringan dari transform yang dilakukan
   * getDashboardCabangSummary_ di backend (Modul_Dashboard.gs), supaya card
   * "Profil Outlet" bisa dirender SEKETIKA dari cabangListCache yang sudah ada
   * di memori (tanpa nunggu roundtrip getDashboardFullSummary), begitu user
   * ganti outlet di picker. Backend tetap sumber kebenaran tunggal - fetch
   * asli tetap jalan di belakang layar dan akan menimpa render optimistik ini.
   */
  function mapCabangRowToProfilSummary_(item) {
    var summary = item.summary || {};
    var cuci = summary.cuci || {};
    var kering = summary.kering || {};
    var setrikaSummary = summary.setrika || {};
    var mesinCuci = item.mesinCuci || [];
    var mesinPengering = item.mesinPengering || [];
    var mesinSetrika = item.mesinSetrika || [];
    var okupansiSrc = item.okupansi || {};

    return {
      cabangId: String(item.id || ""),
      namaLaundry: item.namaLaundry || "Outlet tanpa nama",
      kategoriLayanan: String(item.kategoriLayanan || ""),
      totalUnitCuci: Number(item.totalUnitCuci) || 0,
      totalUnitPengering: Number(item.totalUnitPengering) || 0,
      loadCuciPerBulan: round2(cuci.loadPerBulan),
      loadKeringPerBulan: round2(kering.loadPerBulan),
      jamBukaMenit: Number(item.jamBukaMenit) || 0,
      jamTutupMenit: Number(item.jamTutupMenit) || 0,
      jenisCuci: mesinCuci.length ? (mesinCuci[0].jenis === "rumah_tangga" ? "home" : mesinCuci[0].jenis === "komersial" ? "commercial" : (mesinCuci[0].jenis || "")) : "",
      jenisKering: mesinPengering.length ? (mesinPengering[0].jenis === "komersial" ? "commercial" : (mesinPengering[0].jenis || "")) : "",
      durasiCuci: mesinCuci.length ? (Number(mesinCuci[0].durasiMenit) || 0) : 0,
      durasiKering: mesinPengering.length ? (Number(mesinPengering[0].durasiMenit) || 0) : 0,
      okupansiCuci: Number(okupansiSrc.cuciPersen) || 0,
      okupansiKering: Number(okupansiSrc.keringPersen) || 0,
      totalUnitSetrika: Number(setrikaSummary.totalUnit) || 0,
      kapasitasSetrikaKgPerJam: round2(setrikaSummary.kapasitasKgPerJam),
      jenisSetrika: mesinSetrika.length ? String(mesinSetrika[0].jenis || "") : "",
      okupansiSetrika: Number(okupansiSrc.setrikaPersen) || 0
    };
  }

  function refreshDashboardFast() {
    if (!document.getElementById("dashboardCabangSummary")) return;

    var rows = cabangListCache || [];
    var current = rows.find(function (c) { return c.id === dashboardSelectedOutletId; });
    if (current) {
      renderDashboardCabangCard({ ok: true, data: { rows: [mapCabangRowToProfilSummary_(current)] } });
    }
    refreshDashboard(!!current);
  }

  var dashboardRequestSeq = 0;

  // Cache ringkasan lengkap (7 kartu) per outlet, hidup selama tab dibuka.
  // Dipakai supaya ganti outlet ke outlet yang SUDAH pernah dibuka sesi ini
  // tampil INSTAN (spt kartu Profil Outlet yang dari cabangListCache),
  // bukan nunggu round-trip getDashboardFullSummary() lagi tiap kali ganti
  // - data lama ditampilkan dulu, lalu ditimpa otomatis begitu data baru
  // (paling akurat) datang di belakang layar (stale-while-revalidate).
  var dashboardFullSummaryCache_ = {};

  function renderDashboardFullSummary_(d) {
    d = d || {};
    renderDashboardCabangCard(d.cabang);
    renderDashboardMasterBiayaCard(d.masterBiaya);
    renderDashboardHPPCard(d.hpp);
    renderDashboardHargaLayananCard(d.hargaLayanan);
    renderDashboardFixedCostCard(d.fixedCost);
    renderDashboardBEPCard(d.bep);
    renderDashboardPotensiOmsetCard(d.potensiOmset);

    // Ringkasan eksekutif khusus DESKTOP (>=1100px, lihat Style_Module_Dashboard.html)
    // - data SAMA PERSIS dari fetch yang sama, cuma dirender ulang ke panel
    // terpisah, TIDAK ada fetch tambahan. Elemen ini tidak ada di HP jadi
    // di HP fungsi ini otomatis tidak melakukan apa-apa (guard di bawah).
    if (document.getElementById("desktopDashboardSummary")) {
      renderDesktopKpiSummary_(d);
      renderDesktopBepChart_(d.bep);
      renderDashboardMasterBiayaCard(d.masterBiaya, "desktopMasterBiaya");
      renderDashboardHargaLayananCard(d.hargaLayanan, "desktopHargaLayanan");
      // Data baru bisa mengubah tinggi konten (mis. jumlah komponen Master
      // Biaya) - ukur ulang kunci 1 layar setelah render selesai supaya
      // tetap presisi, bukan cuma sekali saat showScreen("menu").
      if (typeof window.fitDesktopDashboardToViewport_ === "function") {
        requestAnimationFrame(window.fitDesktopDashboardToViewport_);
      }
    }
  }

  /**
   * setDesktopKpiMoney_ / setDesktopKpiUnitValue_: helper KHUSUS panel
   * ringkasan eksekutif desktop (elemen id "desktopKpi*" tidak pernah
   * dirender di HP - lihat Style_Module_Dashboard.html, .desktop-dashboard-
   * summary disembunyikan total di bawah 1100px) - jadi aman mengubah cara
   * rendernya di sini, HP tidak ikut berubah. Cuma memecah string yang SAMA
   * PERSIS dari money0()/formatNum() (tidak ada rumus baru) jadi 2 baris
   * (prefix "Rp" kecil + angka besar) supaya jadi Hero KPI, bukan 1 baris
   * datar spt sebelumnya.
   */
  function setDesktopKpiMoney_(id, hasValue, amount) {
    var el = document.getElementById(id);
    if (!el) return;
    if (!hasValue) { el.innerHTML = '<span class="desktop-kpi-number">-</span>'; return; }
    var num = money0(amount).replace(/^Rp\s*/, '');
    // "Rp" diletakkan INLINE di sebelah kiri nominal (baseline sama), font
    // "Rp" kecil, angka besar - dulu 2 baris (Rp di atas). Dibungkus
    // number-row supaya sejajar 1 baris.
    el.innerHTML = '<span class="desktop-kpi-number-row"><span class="desktop-kpi-currency">Rp</span><span class="desktop-kpi-number">' + escapeHtml(num) + '</span></span>';
  }

  // Keterangan kecil di bawah nominal tiap KPI (khusus panel desktop).
  function setDesktopKpiNote_(id, html, toneClass) {
    var el = document.getElementById(id);
    if (!el) return;
    el.className = 'desktop-kpi-note' + (toneClass ? ' ' + toneClass : '');
    el.innerHTML = html;
  }

  function setDesktopKpiUnitValue_(id, hasValue, numText, unit) {
    var el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = hasValue
      ? '<span class="desktop-kpi-number-row"><span class="desktop-kpi-number">' + escapeHtml(numText) + '</span><span class="desktop-kpi-unit">' + escapeHtml(unit) + '</span></span>'
      : '<span class="desktop-kpi-number">-</span>';
  }

  function renderDesktopKpiSummary_(d) {
    var potensi = (d.potensiOmset && d.potensiOmset.ok && d.potensiOmset.data) ? d.potensiOmset.data : null;
    var bep = (d.bep && d.bep.ok && d.bep.data) ? d.bep.data : null;
    var fixedRows = (d.fixedCost && d.fixedCost.ok && d.fixedCost.data && Array.isArray(d.fixedCost.data.rows)) ? d.fixedCost.data.rows : [];
    var fixedCostVal = fixedRows.length ? toNumber(fixedRows[0].totalPerBulan, 0) : 0;

    var omsetVal = potensi ? toNumber(potensi.estimasiOmsetPerBulan, 0) : 0;
    var profitVal = potensi ? toNumber(potensi.estimasiProfitPerBulan, 0) : 0;
    var bepOk = !!(bep && bep.bepLoadPerBulan > 0);
    var bepOmsetVal = bepOk ? toNumber(bep.bepOmsetPerBulan, 0) : 0;

    setDesktopKpiMoney_("desktopKpiOmset", !!potensi, omsetVal);

    // Keterangan Estimasi Omset: status Rugi / Impas / Untung - parameter
    // dari target BEP omset (bandingkan estimasi omset vs omset BEP) + berapa
    // persen omset sudah tercapai dari target BEP. Supaya orang awam paham
    // posisi bisnisnya sekilas.
    if (potensi && bepOmsetVal > 0) {
      var pctBep = Math.round(omsetVal / bepOmsetVal * 100);
      var stStatus, stTone;
      if (Math.abs(pctBep - 100) < 1) { stStatus = "Impas"; stTone = "note-impas"; }
      else if (omsetVal > bepOmsetVal) { stStatus = "Untung"; stTone = "note-untung"; }
      else { stStatus = "Rugi"; stTone = "note-rugi"; }
      setDesktopKpiNote_("desktopKpiOmsetNote",
        '<span class="kpi-note-status">' + stStatus + '</span> &middot; ' + pctBep + '% dari target BEP omset',
        stTone);
    } else {
      setDesktopKpiNote_("desktopKpiOmsetNote", "Rugi &middot; Impas &middot; Untung (butuh target BEP)", "");
    }

    var profitEl = document.getElementById("desktopKpiProfit");
    if (profitEl) {
      profitEl.classList.toggle("pos", !!potensi && profitVal >= 0);
      profitEl.classList.toggle("neg", !!potensi && profitVal < 0);
      setDesktopKpiMoney_("desktopKpiProfit", !!potensi, profitVal);
    }

    // [2026-07-13] Keterangan Estimasi Profit: margin (% dari omset) + rumus
    // singkat - diubah jadi "Omset - Target BEP Omset" (keputusan user),
    // BUKAN lagi "Omset - Fixed Cost - Variable Cost".
    if (potensi && omsetVal > 0) {
      var margin = profitVal / omsetVal * 100;
      var mStr = (margin >= 0 ? "+" : "") + margin.toFixed(1).replace(".", ",") + "%";
      setDesktopKpiNote_("desktopKpiProfitNote",
        '<span class="kpi-note-status">Margin ' + mStr + '</span><span class="kpi-note-sub">Omset &minus; Target BEP Omset</span>',
        profitVal >= 0 ? "note-untung" : "note-rugi");
    } else {
      setDesktopKpiNote_("desktopKpiProfitNote",
        '<span class="kpi-note-sub">Estimasi Omset &minus; Target BEP Omset</span>', "");
    }

    setDesktopKpiUnitValue_("desktopKpiBepLoad", bepOk, bepOk ? formatNum(bep.bepLoadPerBulan, 0) : "", "load");
    setDesktopKpiMoney_("desktopKpiBepOmset", bepOk, bepOmsetVal);
    setDesktopKpiMoney_("desktopKpiFixedCost", true, fixedCostVal);
  }

  function renderDesktopBepChart_(res) {
    var target = document.getElementById("desktopBepChart");
    if (!target) return;
    if (!res || !res.ok || !res.data || !(res.data.bepLoadPerBulan > 0)) {
      var msg = (res && res.data && Array.isArray(res.data.warnings) && res.data.warnings.length)
        ? res.data.warnings.join(" · ")
        : "Data BEP belum lengkap - isi Fixed Cost & Harga Layanan dulu.";
      target.innerHTML = '<div class="dashboard-empty">' + escapeHtml(msg) + '</div>';
      return;
    }
    var chartSvg = buildBepChartSvg(res.data);
    target.innerHTML = chartSvg
      ? '<div class="bep-chart-wrap">' + chartSvg +
          '<div class="bep-chart-legend">' +
            '<span class="bep-legend-item"><span class="bep-legend-dot sage"></span>Omset</span>' +
            '<span class="bep-legend-item"><span class="bep-legend-dot brass"></span>Total Biaya</span>' +
          '</div>' +
        '</div>'
      : '<div class="dashboard-empty">Grafik belum bisa dibuat.</div>';
  }

  function refreshDashboard(skipCabangCardLoading) {
    if (!document.getElementById("dashboardCabangSummary")) return;

    dashboardRequestSeq += 1;
    var mySeq = dashboardRequestSeq;

    setDashboardAllLoading(skipCabangCardLoading);

    // Optimasi kecepatan: dulu getDashboardFullSummary() BARU ditembak
    // SETELAH listCabang() selesai (2 round-trip berurutan). Kalau sudah ada
    // outlet id dari sesi sebelumnya (var di memori atau localStorage),
    // langsung tembak getDashboardFullSummary() BARENGAN dgn listCabang()
    // (paralel) -- motong 1 round-trip network penuh dari waktu loading
    // dashboard. listCabang() tetap jalan spt biasa utk cabangListCache &
    // outlet picker; kalau ternyata id itu sudah tidak valid lagi (outlet
    // baru dihapus), listCabang() yang menentukan ulang & memicu fetch
    // susulan otomatis (self-healing, lihat pengecekan beforeId di bawah).
    var fastOutletId = dashboardSelectedOutletId || getStoredOutletId_();
    var firedFast = false;
    if (fastOutletId) {
      dashboardSelectedOutletId = fastOutletId;
      fetchDashboardFullSummary_(mySeq);
      firedFast = true;
    }

    callServer_("listCabang", [], function (res) {
        if (mySeq !== dashboardRequestSeq) return;
        var beforeId = dashboardSelectedOutletId;
        if (res && res.ok) {
          cabangListCache = res.data || [];
          ensureDashboardOutletSelection_();
        } else {
          cabangListCache = [];
        }
        if (!firedFast || dashboardSelectedOutletId !== beforeId) {
          fetchDashboardFullSummary_(mySeq);
        }
      }, function () {
        if (mySeq !== dashboardRequestSeq) return;
        if (!firedFast) fetchDashboardFullSummary_(mySeq);
      });
  }

  function fetchDashboardFullSummary_(mySeq) {
    var cId = dashboardSelectedOutletId || null;

    // Stale-while-revalidate: kalau outlet ini sudah pernah dimuat sesi ini,
    // tampilkan dulu data lama itu SEKETIKA (spt Profil Outlet), request
    // baru tetap jalan di belakang layar & akan menimpa dgn data akurat.
    if (cId && dashboardFullSummaryCache_[cId]) {
      renderDashboardFullSummary_(dashboardFullSummaryCache_[cId]);
    }

    callServer_("getDashboardFullSummary", [cId], function (full) {
        if (mySeq !== dashboardRequestSeq) return;
        if (!full || !full.ok) {
          var msg = full && full.error ? full.error : "Gagal memuat ringkasan dashboard.";
          if (!(cId && dashboardFullSummaryCache_[cId])) {
            renderDashboardFullSummary_({
              cabang: { ok: false, error: msg },
              masterBiaya: { ok: false, error: msg },
              hpp: { ok: false, error: msg },
              hargaLayanan: { ok: false, error: msg },
              fixedCost: { ok: false, error: msg },
              bep: { ok: false, error: msg },
              potensiOmset: { ok: false, error: msg }
            });
          }
          return;
        }
        var d = full.data || {};
        if (cId) dashboardFullSummaryCache_[cId] = d;
        renderDashboardFullSummary_(d);
      }, function (err) {
        if (mySeq !== dashboardRequestSeq) return;
        if (cId && dashboardFullSummaryCache_[cId]) return; // data lama tetap ditampilkan, jangan ditimpa error
        var msg = err && err.message ? err.message : String(err);
        renderDashboardFullSummary_({
          cabang: { ok: false, error: msg },
          masterBiaya: { ok: false, error: msg },
          hpp: { ok: false, error: msg },
          hargaLayanan: { ok: false, error: msg },
          fixedCost: { ok: false, error: msg },
          bep: { ok: false, error: msg },
          potensiOmset: { ok: false, error: msg }
        });
      });
  }

  window.openScreenCabangList = function () {
    showScreen("list");
    refreshList();
  };

  window.openScreenMasterBiaya = function () {
    showScreen("masterBiaya");
    refreshBiayaPickCabangList();
  };

  function renderFooter() {
    var bar = document.getElementById("footerBar");
    var content = document.getElementById("footerContent");
    content.innerHTML = "";

    if (
      view.screen === "menu" ||
      view.screen === "list" ||
      view.screen === "masterBiaya" ||
      view.screen === "gasList" ||
      view.screen === "chemicalList" ||
      view.screen === "packingList" ||
      view.screen === "strukturHPPList" ||
      view.screen === "strukturHPPDetail" ||
      view.screen === "hargaLayananList" ||
      view.screen === "biayaTetapList"
    ) {
      bar.style.display = "none";
      return;
    }

    if (view.screen === "ringkasan") {
      bar.style.display = "flex";
      var delBtn = document.createElement("button");
      delBtn.className = "btn-danger";
      delBtn.setAttribute("aria-label", "Hapus cabang");
      delBtn.innerHTML = "&#128465;";
      delBtn.onclick = function () { openConfirmDelete(view.editingId); };

      var editBtn = document.createElement("button");
      editBtn.className = "btn-primary";
      editBtn.style.flex = "1";
      editBtn.textContent = "Edit data";
      editBtn.onclick = function () { openFormEdit(view.editingId); };

      content.appendChild(delBtn);
      content.appendChild(editBtn);
      return;
    }

    if (view.screen === "form") {
      bar.style.display = "flex";
      var cancelBtn = document.createElement("button");
      cancelBtn.className = "btn-secondary";
      cancelBtn.textContent = "Batal";
      cancelBtn.onclick = function () {
        if (view.isNew) { showScreen("list"); refreshList(); }
        else { openRingkasan(view.editingId); }
      };

      var saveBtn = document.createElement("button");
      saveBtn.className = "btn-primary";
      saveBtn.id = "saveBtn";
      saveBtn.textContent = view.isNew ? "Simpan cabang baru" : "Simpan perubahan";
      saveBtn.onclick = saveForm;

      content.appendChild(cancelBtn);
      content.appendChild(saveBtn);
      return;
    }

    if (view.screen === "gasForm") {
      bar.style.display = "flex";

      var gasCancelBtn = document.createElement("button");
      gasCancelBtn.className = "btn-secondary";
      gasCancelBtn.textContent = "Batal";
      gasCancelBtn.onclick = function () { openGasList(view.gasCabangId); };

      var gasSaveBtn = document.createElement("button");
      gasSaveBtn.className = "btn-primary flame";
      gasSaveBtn.id = "gasSaveBtn";
      gasSaveBtn.textContent = view.gasIsNew ? "Simpan data gas" : "Simpan perubahan";
      gasSaveBtn.onclick = saveGasForm;

      content.appendChild(gasCancelBtn);
      content.appendChild(gasSaveBtn);
      return;
    }

    if (view.screen === "chemicalForm") {
      bar.style.display = "flex";

      var chemicalCancelBtn = document.createElement("button");
      chemicalCancelBtn.className = "btn-secondary";
      chemicalCancelBtn.textContent = "Batal";
      chemicalCancelBtn.onclick = function () { openChemicalList(view.chemicalCabangId); };

      var chemicalSaveBtn = document.createElement("button");
      chemicalSaveBtn.className = "btn-primary flame";
      chemicalSaveBtn.id = "chemicalSaveBtn";
      chemicalSaveBtn.textContent = view.chemicalIsNew ? "Simpan item chemical" : "Simpan perubahan";
      chemicalSaveBtn.onclick = saveChemicalForm;

      content.appendChild(chemicalCancelBtn);
      content.appendChild(chemicalSaveBtn);
      return;
    }

    if (view.screen === "packingForm") {
      bar.style.display = "flex";

      var packingCancelBtn = document.createElement("button");
      packingCancelBtn.className = "btn-secondary";
      packingCancelBtn.textContent = "Batal";
      packingCancelBtn.onclick = function () { openPackingList(view.packingCabangId); };

      var packingSaveBtn = document.createElement("button");
      packingSaveBtn.className = "btn-primary flame";
      packingSaveBtn.id = "packingSaveBtn";
      packingSaveBtn.textContent = view.packingIsNew ? "Simpan item packing" : "Simpan perubahan";
      packingSaveBtn.onclick = savePackingForm;

      content.appendChild(packingCancelBtn);
      content.appendChild(packingSaveBtn);
      return;
    }

    if (view.screen === "listrikForm") {
      bar.style.display = "flex";

      var listrikCancelBtn = document.createElement("button");
      listrikCancelBtn.className = "btn-secondary";
      listrikCancelBtn.textContent = "Batal";
      listrikCancelBtn.onclick = function () {
        showScreen("masterBiaya");
        refreshBiayaPickCabangList();
      };

      var listrikSaveBtn = document.createElement("button");
      listrikSaveBtn.className = "btn-primary volt";
      listrikSaveBtn.id = "listrikSaveBtn";
      listrikSaveBtn.textContent = "Simpan perubahan";
      listrikSaveBtn.onclick = saveListrikFormManual;

      content.appendChild(listrikCancelBtn);
      content.appendChild(listrikSaveBtn);
      return;
    }

    if (view.screen === "airForm") {
      bar.style.display = "flex";

      var airCancelBtn = document.createElement("button");
      airCancelBtn.className = "btn-secondary";
      airCancelBtn.textContent = "Batal";
      airCancelBtn.onclick = function () {
        showScreen("masterBiaya");
        refreshBiayaPickCabangList();
      };

      var airSaveBtn = document.createElement("button");
      airSaveBtn.className = "btn-primary sage";
      airSaveBtn.id = "airSaveBtn";
      airSaveBtn.textContent = "Simpan perubahan";
      airSaveBtn.onclick = saveAirForm;

      content.appendChild(airCancelBtn);
      content.appendChild(airSaveBtn);
      return;
    }

    if (view.screen === "notaKasirForm") {
      bar.style.display = "flex";

      var notaCancelBtn = document.createElement("button");
      notaCancelBtn.className = "btn-secondary";
      notaCancelBtn.textContent = "Batal";
      notaCancelBtn.onclick = function () {
        showScreen("masterBiaya");
        refreshBiayaPickCabangList();
      };

      var notaSaveBtn = document.createElement("button");
      notaSaveBtn.className = "btn-primary brass";
      notaSaveBtn.id = "notaKasirSaveBtn";
      notaSaveBtn.textContent = "Simpan perubahan";
      notaSaveBtn.onclick = saveNotaKasirForm;

      content.appendChild(notaCancelBtn);
      content.appendChild(notaSaveBtn);
      return;
    }

    if (view.screen === "hargaLayananDetail") {
      bar.style.display = "flex";

      var hargaResetBtn = document.createElement("button");
      hargaResetBtn.className = "btn-danger";
      hargaResetBtn.style.width = "72px";
      hargaResetBtn.textContent = "Reset";
      hargaResetBtn.onclick = resetHargaLayananCurrent;

      var hargaCancelBtn = document.createElement("button");
      hargaCancelBtn.className = "btn-secondary";
      hargaCancelBtn.textContent = "Batal";
      hargaCancelBtn.onclick = function () { openHargaLayananOutletList(); };

      var hargaSaveBtn = document.createElement("button");
      hargaSaveBtn.className = "btn-primary";
      hargaSaveBtn.id = "hargaLayananSaveBtn";
      hargaSaveBtn.textContent = "Simpan perubahan";
      hargaSaveBtn.onclick = saveHargaLayananFromInputs;

      content.appendChild(hargaResetBtn);
      content.appendChild(hargaCancelBtn);
      content.appendChild(hargaSaveBtn);
      return;
    }

    if (view.screen === "biayaTetapForm") {
      bar.style.display = "flex";

      var fixedDeleteBtn = document.createElement("button");
      fixedDeleteBtn.className = "btn-danger";
      fixedDeleteBtn.style.width = "72px";
      fixedDeleteBtn.textContent = "Reset";
      fixedDeleteBtn.onclick = deleteBiayaTetapOutletCurrent;

      var fixedCancelBtn = document.createElement("button");
      fixedCancelBtn.className = "btn-secondary";
      fixedCancelBtn.textContent = "Batal";
      fixedCancelBtn.onclick = function () { openBiayaTetapOutletList(); };

      var fixedSaveBtn = document.createElement("button");
      fixedSaveBtn.className = "btn-primary";
      fixedSaveBtn.id = "biayaTetapSaveBtn";
      fixedSaveBtn.textContent = "Simpan perubahan";
      fixedSaveBtn.onclick = saveBiayaTetapOutletCurrent;

      content.appendChild(fixedDeleteBtn);
      content.appendChild(fixedCancelBtn);
      content.appendChild(fixedSaveBtn);
      return;
    }
  }

  window.goBackToList = function () {
    showScreen("list");
    refreshList();
  };

</script>
